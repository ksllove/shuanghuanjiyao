<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>文件管理器 Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="off" id="offBar">⚠️ 网络断开</div>

<aside class="side">
  <h1>🌐 文件管理器 <small id="cnt">0</small></h1>
  <div class="tk-bar">
    <input id="tokenInput" type="text" placeholder="粘贴 GitHub Token (ghp_...)" autocomplete="off">
    <button onclick="doSaveToken()">连接</button>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="切换主题">☀️</button>
    <span class="st off" id="tokenSt">未连接</span>
    <div class="tk-warn" id="tokenWarn">⚠️ Token 存于浏览器本地，仅限个人设备使用。建议使用 Fine-grained Token 并限制仓库权限。</div>
  </div>
  <div class="srch"><input id="sI" placeholder="🔍 搜索…" autocomplete="off"></div>
  <div class="list" id="fL"><div style="text-align:center;padding:40px;color:var(--text6);font-size:13px">设置 Token 后自动加载</div></div>
  <div class="sfoot">
    <button class="btn-primary" onclick="doUpload()">＋ 上传</button>
    <button class="btn-outline" onclick="doNew()">📝 新建</button>
  </div>
</aside>

<main class="main">
  <div class="mtop" id="mT" style="display:none">
    <h2 id="mTi"></h2>
    <div class="acts">
      <button onclick="doEdit()">✏️ 编辑</button>
      <button onclick="doPreview()">👁 预览</button>
      <button class="del" onclick="doDel()">🗑 删除</button>
    </div>
  </div>
  <div class="mbody" id="mB">
    <div class="empty"><div class="ei">🌐</div><p>设置 Token 后即可使用</p><small>文件存在 GitHub 仓库，所有人共享</small></div>
  </div>
</main>

<!-- 编辑器全屏面板 -->
<div class="editor-overlay" id="editorOverlay">
  <div class="draft-banner" id="draftBanner">
    <span>📋</span>
    <span class="draft-text">发现未保存的草稿</span>
    <button onclick="restoreDraft()">恢复</button>
    <button onclick="dismissDraft()">丢弃</button>
  </div>
  <div class="eo-bar">
    <h2 id="eoTitle">编辑</h2>
    <div class="acts">
      <button onclick="doFmt()" title="格式化代码">🔧 格式化</button>
      <button onclick="toggleWrap()" id="wrapBtn" title="切换自动换行">↩️ 换行</button>
      <button onclick="togglePreview()" id="prevToggleBtn" title="切换预览面板">👁 预览</button>
      <button class="save-btn" onclick="doSaveEdit()" title="Ctrl+S">💾 保存</button>
      <button class="close-btn" onclick="closeEditor()">✕ 关闭</button>
    </div>
  </div>
  <div class="eo-body">
    <div class="eo-editor" id="eoEditor">
      <div class="cm-wrap" id="cmContainer" style="flex:1;display:flex;flex-direction:column;min-height:0"></div>
    </div>
    <div class="resize-handle" id="resizeHandle"></div>
    <div class="eo-preview" id="eoPreview">
      <div class="preview-header">
        <span>👁 实时预览</span>
        <label><input type="checkbox" id="autoRefresh" checked> 自动刷新</label>
      </div>
      <iframe id="prevFrame" sandbox="allow-same-origin allow-scripts"></iframe>
    </div>
  </div>
  <div class="kb-bar">
    <span><kbd>Ctrl</kbd>+<kbd>S</kbd> 保存</span>
    <span><kbd>Ctrl</kbd>+<kbd>F</kbd> 搜索</span>
    <span><kbd>Ctrl</kbd>+<kbd>H</kbd> 替换</span>
    <span><kbd>Ctrl</kbd>+<kbd>Z</kbd> 撤销</span>

  </div>
</div>


<!-- 上传弹窗 -->
<div class="ov" id="nOv">
  <div class="md">
    <h2>📤 上传文件</h2>
    <div class="fg">
      <label class="up" id="upZ" for="fIn"><p>📄 点击或拖拽文件</p><small>支持所有文件类型</small></label>
      <input type="file" id="fIn" multiple style="display:none">
    </div>
    <div id="fQ"></div>
    <div id="mI">
      <div class="fg"><label>文件名</label><input type="text" id="nN" placeholder="留空用原文件名"></div>
      <div class="fg"><label>HTML</label><textarea id="nC" rows="7" placeholder="粘贴 HTML…"></textarea></div>
    </div>
    <div class="ma"><button class="bs" onclick="closeOv('nOv')">取消</button><button class="bp" onclick="doSave()">保存</button></div>
  </div>
</div>

<!-- 删除确认弹窗 -->
<div class="ov" id="delOv">
  <div class="md" style="max-width:480px">
    <h2>🗑 确认删除</h2>
    <p style="color:var(--text3);font-size:13px;margin-bottom:12px">此操作不可撤销。请输入文件名以确认删除：</p>
    <p style="color:var(--accent2);font-weight:600;font-size:14px;margin-bottom:12px" id="delConfirmName"></p>
    <div class="confirm-del">
      <input type="text" id="delConfirmInput" placeholder="输入文件名…" oninput="onDelConfirmInput()" autocomplete="off">
      <div class="hint">输入上方显示的完整文件名以启用删除按钮</div>
    </div>
    <div class="ma">
      <button class="bs" onclick="closeOv('delOv')">取消</button>
      <button class="bp" id="delConfirmBtn" disabled onclick="doDelConfirm()" style="background:var(--red)">🗑 删除</button>
    </div>
  </div>
</div>

<script src="app.js"></script>

})();
</script>
</body>
</html>
