<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>会议纪要</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333;height:100vh;overflow:hidden;display:flex}

.side{width:280px;min-width:280px;background:#1a1a2e;color:#ccc;display:flex;flex-direction:column}
.side h1{font-size:15px;padding:16px;border-bottom:1px solid #2a2a40;color:#eee;display:flex;align-items:center;gap:6px}
.side h1 small{font-size:11px;color:#666;margin-left:auto;font-weight:400}
.srch{padding:8px 10px}
.srch input{width:100%;padding:7px 10px;background:#2a2a40;border:none;border-radius:6px;color:#ccc;font-size:13px;outline:none}
.srch input::placeholder{color:#555}
.srch input:focus{box-shadow:0 0 0 2px #4a6fa5}
.list{flex:1;overflow-y:auto;padding:0 6px}
.list::-webkit-scrollbar{width:3px}
.list::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
.fi{padding:10px 10px;border-radius:6px;cursor:pointer;margin-bottom:1px;border-left:3px solid transparent;transition:.1s}
.fi:hover{background:#2a2a40}
.fi.on{background:#3a3a55;border-left-color:#4a6fa5}
.fi .fn{font-size:13px;font-weight:600;color:#ddd;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fi .fm{font-size:11px;color:#666;margin-top:2px}
.sfoot{padding:10px;border-top:1px solid #2a2a40}
.sfoot button{width:100%;padding:9px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;background:#4a6fa5;color:#fff}
.sfoot button:hover{background:#5a8fc5}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.mtop{padding:12px 20px;background:#fff;border-bottom:1px solid #ddd;display:flex;align-items:center;gap:10px;min-height:50px}
.mtop h2{font-size:16px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mtop .acts{display:flex;gap:5px}
.mtop .acts button{padding:5px 12px;border:1px solid #ccc;border-radius:6px;background:#fff;font-size:12px;cursor:pointer;color:#555}
.mtop .acts button:hover{background:#f5f5f5}
.mtop .acts .del:hover{background:#fee;color:#e55;border-color:#eaa}
.mbody{flex:1;overflow-y:auto;padding:20px 24px 50px}

.info{font-size:12px;color:#888;margin-bottom:12px;display:flex;gap:12px}
.card{background:#fff;border-radius:10px;border:1px solid #ddd;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card iframe{width:100%;border:none;display:block;min-height:400px}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#999;gap:8px}
.empty .ei{font-size:48px;opacity:.2}
.ld{text-align:center;padding:40px;color:#999}

.err{background:#fff5f5;border:1px solid #fcc;border-radius:8px;padding:16px;text-align:center;color:#c44;margin:10px 0}
.err button{margin-top:8px;padding:6px 16px;border:none;border-radius:6px;background:#4a6fa5;color:#fff;cursor:pointer;font-size:12px}

.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:100}
.ov.show{display:flex}
.md{background:#fff;border-radius:14px;padding:24px;width:500px;max-width:92vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.md h2{font-size:16px;margin-bottom:14px;font-weight:700}
.md .fg{margin-bottom:12px}
.md label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px}
.md input[type=text],.md textarea{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none}
.md input:focus,.md textarea:focus{border-color:#4a6fa5;box-shadow:0 0 0 3px rgba(74,111,165,.12)}
.md textarea{font-family:'Menlo','Consolas',monospace;font-size:12px;resize:vertical;min-height:180px}
.md .ma{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.md .ma button{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.bp{background:#4a6fa5;color:#fff}.bp:hover{background:#5a8fc5}
.bs{background:#f0f0f0;color:#555}.bs:hover{background:#e5e5e5}
.bp:disabled{opacity:.4;cursor:not-allowed}

.up{border:2px dashed #ccc;border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:.12s}
.up:hover,.up.dg{border-color:#4a6fa5;background:#f0f4ff}
.up p{font-size:13px;color:#888}
.up small{font-size:11px;color:#aaa}
.qi{display:flex;align-items:center;gap:6px;padding:6px 10px;background:#f8f8f8;border-radius:6px;margin-bottom:4px;font-size:12px}
.qi .qn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qi .qs{color:#999;font-size:10px}
.qi .qst{font-size:10px}.qst.ok{color:#4a4}.qst.er{color:#e44}.qst.ld{color:#4a6fa5}
.qi button{background:none;border:none;color:#e55;cursor:pointer;font-size:14px}

.toast{position:fixed;bottom:20px;right:20px;padding:8px 16px;border-radius:8px;color:#fff;font-size:12px;font-weight:500;z-index:200;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast.ok{background:#4a4}.toast.er{background:#e44}
.off{position:fixed;top:0;left:0;right:0;background:#e44;color:#fff;text-align:center;padding:5px;font-size:11px;font-weight:600;z-index:300;display:none}
.off.show{display:block}
@media(max-width:600px){body{flex-direction:column}.side{width:100%;min-width:100%;height:40vh}.main{min-height:60vh}}
</style>
</head>
<body>
<div class="off" id="offBar">⚠️ 网络断开</div>

<aside class="side">
  <h1>📋 会议纪要 <small id="cnt"></small></h1>
  <div class="srch"><input id="sI" placeholder="搜索…" autocomplete="off"></div>
  <div class="list" id="fL"></div>
  <div class="sfoot"><button id="btnN">＋ 新建会议纪要</button></div>
</aside>

<main class="main">
  <div class="mtop" id="mT" style="display:none">
    <h2 id="mTi"></h2>
    <div class="acts">
      <button onclick="doEdit()">✏️ 编辑</button>
      <button class="del" onclick="doDel()">🗑 删除</button>
    </div>
  </div>
  <div class="mbody" id="mB">
    <div class="empty"><div class="ei">📋</div><p>选择一条会议纪要</p></div>
  </div>
</main>

<!-- New -->
<div class="ov" id="nOv">
  <div class="md">
    <h2>＋ 新建会议纪要</h2>
    <div class="fg">
      <label class="up" id="upZ" for="fIn">
        <p>📄 点击选择或拖拽 HTML 文件</p><small>支持批量 .html/.htm</small>
      </label>
      <input type="file" id="fIn" accept=".html,.htm" multiple style="display:none">
    </div>
    <div id="fQ"></div>
    <div id="mI">
      <div class="fg"><label>文件名（可选）</label><input type="text" id="nN" placeholder="2024-04-22-项目评审会"></div>
      <div class="fg"><label>内容 (HTML)</label><textarea id="nC" rows="7" placeholder="粘贴 HTML…"></textarea></div>
    </div>
    <div class="ma">
      <button class="bs" onclick="closeOv('nOv')">取消</button>
      <button class="bp" id="btnS">保存</button>
    </div>
  </div>
</div>

<!-- Edit -->
<div class="ov" id="eOv">
  <div class="md">
    <h2>✏️ 编辑</h2>
    <div class="fg"><label>文件名</label><input type="text" id="eN"></div>
    <div class="fg"><label>内容 (HTML)</label><textarea id="eC" rows="14"></textarea></div>
    <div class="ma">
      <button class="bs" onclick="closeOv('eOv')">取消</button>
      <button class="bp" id="btnE">保存</button>
    </div>
  </div>
</div>

<script>
// ═══ IndexedDB 存储层 ═══
const DB_NAME = 'MeetingMinutesDB';
const DB_VER = 1;
const STORE = 'minutes';

function openDB() {
  return new Promise((ok, no) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE)) {
        db.createObjectStore(STORE, { keyPath: 'name' });
      }
    };
    req.onsuccess = e => ok(e.target.result);
    req.onerror = e => no(e.target.error);
  });
}

async function dbGetAll() {
  const db = await openDB();
  return new Promise((ok, no) => {
    const tx = db.transaction(STORE, 'readonly');
    const st = tx.objectStore(STORE);
    const req = st.getAll();
    req.onsuccess = () => ok(req.result);
    req.onerror = () => no(req.error);
  });
}

async function dbGet(name) {
  const db = await openDB();
  return new Promise((ok, no) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).get(name);
    req.onsuccess = () => ok(req.result);
    req.onerror = () => no(req.error);
  });
}

async function dbPut(item) {
  const db = await openDB();
  return new Promise((ok, no) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(item);
    tx.oncomplete = () => ok();
    tx.onerror = () => no(tx.error);
  });
}

async function dbDelete(name) {
  const db = await openDB();
  return new Promise((ok, no) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).delete(name);
    tx.oncomplete = () => ok();
    tx.onerror = () => no(tx.error);
  });
}

// ═══ 工具函数 ═══
let FILES = [], ACTIVE = null, EDITING = null, QUEUE = [];

const $ = id => document.getElementById(id);
const esc = s => { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML };
function toast(m, t = 'ok') {
  const e = document.createElement('div');
  e.className = 'toast ' + t; e.textContent = m;
  document.body.appendChild(e); setTimeout(() => e.remove(), 3000);
}
function closeOv(id) { $(id).classList.remove('show') }
function openOv(id) { $(id).classList.add('show') }

// ═══ 加载列表 ═══
async function loadList() {
  try {
    const all = await dbGetAll();
    FILES = all.map(f => ({
      name: f.name,
      size: f.content.length,
      content: f.content,
      updated: f.updated || 0
    })).sort((a, b) => b.name.localeCompare(a.name));
    render();
  } catch (e) {
    $('fL').innerHTML = '<div class="err"><p>' + esc(e.message) + '</p><button onclick="loadList()">🔄 重试</button></div>';
  }
}

function render(q) {
  q = (q || '').toLowerCase();
  const ls = FILES.filter(f => f.name.toLowerCase().includes(q));
  $('cnt').textContent = FILES.length + ' 条';
  const el = $('fL');
  if (!ls.length) {
    el.innerHTML = '<div style="text-align:center;padding:24px;color:#666;font-size:12px">' + (FILES.length ? '无匹配' : '暂无文件') + '</div>';
    return;
  }
  el.innerHTML = ls.map(f =>
    '<div class="fi' + (f.name === ACTIVE ? ' on' : '') + '" data-n="' + esc(f.name) + '">' +
    '<div class="fn">' + esc(f.name.replace(/\.html?$/i, '')) + '</div>' +
    '<div class="fm">' + (f.size / 1024).toFixed(1) + ' KB</div></div>'
  ).join('');
}

// ═══ 查看 ═══
function view(name) {
  ACTIVE = name; render($('sI').value);
  $('mT').style.display = '';
  $('mTi').textContent = name.replace(/\.html?$/i, '');
  const mb = $('mB');
  const f = FILES.find(x => x.name === name);
  if (!f) {
    mb.innerHTML = '<div class="err"><p>文件不存在</p></div>';
    return;
  }
  const safe = f.content.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  mb.innerHTML = '<div class="info"><span>📎 ' + esc(name) + '</span><span>📏 ' + (f.size / 1024).toFixed(1) + ' KB</span></div>' +
    '<div class="card"><iframe srcdoc="' + safe + '" sandbox="allow-same-origin" onload="fit(this)"></iframe></div>';
  mb.scrollTop = 0;
}

function fit(ifr) {
  try {
    const d = ifr.contentDocument || ifr.contentWindow.document;
    const r = () => { ifr.style.height = Math.max(400, d.body.scrollHeight + 20) + 'px' };
    r(); new ResizeObserver(r).observe(d.body);
  } catch {}
}

// ═══ 新建 ═══
$('btnN').onclick = () => {
  QUEUE = []; $('nN').value = ''; $('nC').value = '';
  $('fQ').innerHTML = ''; $('fIn').value = ''; togM(); openOv('nOv');
};
$('nOv').onclick = e => { if (e.target === e.currentTarget) closeOv('nOv') };
function togM() { $('mI').style.display = QUEUE.length ? 'none' : '' }

$('fIn').onchange = e => { addQ(e.target.files); e.target.value = '' };
const uz = $('upZ');
uz.ondragover = e => { e.preventDefault(); uz.classList.add('dg') };
uz.ondragleave = () => uz.classList.remove('dg');
uz.ondrop = e => { e.preventDefault(); uz.classList.remove('dg'); addQ(e.dataTransfer.files) };

async function addQ(fl) {
  for (const f of Array.from(fl).filter(x => /\.html?$/i.test(x.name)))
    QUEUE.push({ name: f.name, content: await f.text(), size: f.size });
  if (!QUEUE.length && fl.length) { toast('请选择 .html 文件', 'er'); return }
  renderQ();
}

function renderQ() {
  $('fQ').innerHTML = QUEUE.map((f, i) =>
    '<div class="qi"><span class="qn">' + esc(f.name) + '</span>' +
    '<span class="qs">' + (f.size / 1024).toFixed(1) + 'KB</span>' +
    '<span class="qst" id="qs' + i + '"></span>' +
    '<button onclick="rmQ(' + i + ')">✕</button></div>'
  ).join('');
  togM();
}
window.rmQ = function (i) { QUEUE.splice(i, 1); renderQ() };

$('btnS').onclick = async () => {
  const btn = $('btnS'); btn.disabled = true;
  try {
    if (QUEUE.length) {
      let ok = 0, fail = 0;
      for (let i = 0; i < QUEUE.length; i++) {
        const f = QUEUE[i], st = $('qs' + i);
        st.textContent = '保存…'; st.className = 'qst ld';
        try {
          await dbPut({ name: f.name, content: f.content, updated: Date.now() });
          st.textContent = '✓'; st.className = 'qst ok'; ok++;
        } catch {
          st.textContent = '✗'; st.className = 'qst er'; fail++;
        }
      }
      toast(`${ok}成功${fail ? ' ' + fail + '失败' : ''}`, fail ? 'er' : 'ok');
    } else {
      const nm = $('nN').value.trim(), ct = $('nC').value.trim();
      if (!ct) { toast('请输入内容', 'er'); btn.disabled = false; return }
      const fn = (nm || new Date().toISOString().slice(0, 10)) + '.html';
      await dbPut({ name: fn, content: ct, updated: Date.now() });
      toast('保存成功');
    }
    await loadList(); closeOv('nOv');
  } catch (e) { toast('失败: ' + e.message, 'er') }
  btn.disabled = false;
};

// ═══ 编辑 ═══
window.doEdit = () => {
  if (!ACTIVE) return;
  EDITING = ACTIVE;
  $('eN').value = ACTIVE;
  const f = FILES.find(x => x.name === ACTIVE);
  $('eC').value = f ? f.content : '';
  openOv('eOv');
};
$('eOv').onclick = e => { if (e.target === e.currentTarget) closeOv('eOv') };

$('btnE').onclick = async () => {
  const nm = $('eN').value.trim(), ct = $('eC').value;
  if (!nm || !ct) { toast('不能为空', 'er'); return }
  const btn = $('btnE'); btn.disabled = true;
  try {
    if (nm !== EDITING) {
      await dbDelete(EDITING);
    }
    await dbPut({ name: nm, content: ct, updated: Date.now() });
    toast('保存成功'); await loadList(); closeOv('eOv'); view(nm);
  } catch (e) { toast('失败: ' + e.message, 'er') }
  btn.disabled = false;
};

// ═══ 删除 ═══
window.doDel = async () => {
  if (!ACTIVE || !confirm('删除「' + ACTIVE + '」？不可恢复')) return;
  try {
    await dbDelete(ACTIVE);
    toast('已删除'); ACTIVE = null;
    $('mT').style.display = 'none';
    $('mB').innerHTML = '<div class="empty"><div class="ei">📋</div><p>选择一条会议纪要</p></div>';
    await loadList();
  } catch (e) { toast('删除失败: ' + e.message, 'er') }
};

// ═══ 事件 ═══
$('fL').onclick = e => { const it = e.target.closest('.fi'); if (it) view(it.dataset.n) };
let st; $('sI').oninput = e => { clearTimeout(st); st = setTimeout(() => render(e.target.value), 150) };
window.addEventListener('online', () => $('offBar').classList.remove('show'));
window.addEventListener('offline', () => $('offBar').classList.add('show'));

// ═══ 初始化 ═══
loadList();
</script>
</body>
</html>
