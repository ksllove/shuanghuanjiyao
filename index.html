<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📋 会议纪要管理</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<style>
:root{--bg:#f5f5f7;--surface:#fff;--sidebar:#1a1b2e;--sh:#24283b;--sa:#414868;--tx:#1d1d1f;--tx2:#86868b;--ac:#0071e3;--bd:#d2d2d7;--ok:#30d158;--err:#ff453a;--wrn:#ffd60a;--r:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input,textarea{font-family:inherit;outline:none}

.app{display:flex;height:100vh}

/* ─── Sidebar ─── */
.sb{width:300px;min-width:300px;background:var(--sidebar);display:flex;flex-direction:column}
.sb-head{padding:18px 16px 12px;border-bottom:1px solid rgba(255,255,255,.05)}
.sb-head h1{font-size:16px;font-weight:700;color:#c0caf5;display:flex;align-items:center;gap:8px}
.sb-head .cnt{font-size:11px;color:#565869;background:rgba(255,255,255,.05);padding:2px 8px;border-radius:10px;margin-left:auto}
.admin-bar{display:none;padding:7px 16px;background:rgba(255,69,58,.1);color:var(--err);font-size:11px;font-weight:600;text-align:center}
.admin-bar.on{display:block}
.sb-search{padding:8px 12px}
.sb-search input{width:100%;padding:7px 10px 7px 30px;background:rgba(255,255,255,.05);border:1px solid transparent;border-radius:7px;font-size:13px;color:#c0caf5;transition:border .15s}
.sb-search input::placeholder{color:#565869}
.sb-search input:focus{border-color:var(--ac);background:rgba(255,255,255,.07)}
.sb-search{position:relative}
.sb-search::before{content:'🔍';position:absolute;left:22px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none;z-index:1}
.list{flex:1;overflow-y:auto;padding:2px 6px}
.list::-webkit-scrollbar{width:3px}
.list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
.item{padding:9px 10px;border-radius:7px;cursor:pointer;margin-bottom:1px;border-left:3px solid transparent;transition:all .1s;display:flex;align-items:center;gap:9px}
.item:hover{background:var(--sh)}
.item.on{background:var(--sa);border-left-color:var(--ac)}
.item .ic{font-size:16px;opacity:.5;flex-shrink:0}
.item .inf{flex:1;min-width:0}
.item .nm{font-size:12.5px;font-weight:600;color:#c0caf5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item .mt{font-size:10.5px;color:#565869;margin-top:1px}
.sb-foot{padding:10px 12px;border-top:1px solid rgba(255,255,255,.05);display:flex;gap:6px}
.sb-foot button{flex:1;padding:8px;border-radius:7px;font-size:12px;font-weight:600;transition:all .12s}
.ba{background:rgba(255,255,255,.05);color:#a9b1d6}.ba:hover{background:rgba(255,255,255,.08)}
.ba.ad{background:rgba(255,69,58,.12);color:var(--err)}
.bn{background:var(--ac);color:#fff;display:none}.bn:hover{opacity:.85}
.sb-foot.on .bn{display:block}

/* ─── Main ─── */
.mn{flex:1;display:flex;flex-direction:column;overflow:hidden}
.mn-head{padding:14px 24px;background:var(--surface);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;min-height:54px}
.mn-head h2{font-size:17px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mn-acts{display:flex;gap:5px}
.mn-acts button{padding:5px 12px;border:1px solid var(--bd);border-radius:7px;background:var(--surface);font-size:12px;font-weight:500;color:var(--tx2);transition:all .1s}
.mn-acts button:hover{background:var(--bg)}
.mn-acts .bdel:hover{background:#fff0f0;border-color:var(--err);color:var(--err)}
.mn-body{flex:1;overflow-y:auto;padding:20px 24px 50px}
.mn-body::-webkit-scrollbar{width:5px}
.mn-body::-webkit-scrollbar-thumb{background:#ddd;border-radius:5px}

/* ─── Empty ─── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--tx2);gap:10px}
.empty .ei{font-size:52px;opacity:.2}
.empty p{font-size:14px;font-weight:500}
.empty .sub{font-size:12px;opacity:.5}

/* ─── Card ─── */
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--bd);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card iframe{width:100%;border:none;display:block;min-height:400px}
.meta{display:flex;gap:10px;font-size:11.5px;color:var(--tx2);margin-bottom:14px}
.meta span{display:flex;align-items:center;gap:3px}

/* ─── Loading ─── */
.ld{text-align:center;padding:40px 20px;color:var(--tx2)}
.ld .sp{display:inline-block;width:24px;height:24px;border:2.5px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .6s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.ld p{font-size:13px;margin-top:6px}

/* ─── Skeleton ─── */
.sk{padding:10px;margin:0 6px 3px;border-radius:7px}
.sk-b{height:11px;border-radius:3px;background:rgba(255,255,255,.04);margin-bottom:6px}
.sk-b.s{width:55%}

/* ─── Error ─── */
.err{background:#fff5f5;border:1px solid #fecaca;border-radius:var(--r);padding:18px;text-align:center;color:var(--err);margin:16px 0}
.err p{font-size:13px;margin-bottom:3px}
.err .hint{font-size:11px;color:var(--tx2);margin-bottom:10px}
.err button{padding:7px 18px;border:none;border-radius:7px;background:var(--ac);color:#fff;font-size:12px;font-weight:600}

/* ─── Modal ─── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.ov.show{display:flex}
.md{background:var(--surface);border-radius:14px;padding:24px;width:480px;max-width:92vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mdIn .2s ease}
@keyframes mdIn{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
.md h2{font-size:17px;font-weight:700;margin-bottom:3px}
.md .ms{font-size:12px;color:var(--tx2);margin-bottom:16px}
.md .fg{margin-bottom:12px}
.md label{display:block;font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.md input[type=text],.md input[type=password],.md textarea{width:100%;padding:9px 12px;border:1px solid var(--bd);border-radius:7px;font-size:13px;transition:border .15s}
.md input:focus,.md textarea:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(0,113,227,.12)}
.md textarea{font-family:'Menlo','Consolas',monospace;font-size:12px;resize:vertical;min-height:180px}
.md .em{color:var(--err);font-size:11px;min-height:16px;margin-bottom:6px}
.md .ma{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.md .ma button{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600}
.bp{background:var(--ac);color:#fff}.bp:hover{opacity:.85}
.bs{background:var(--bg);color:var(--tx2)}.bs:hover{background:#e8e8ed}
.bp:disabled{opacity:.35;cursor:not-allowed}

/* ─── Upload ─── */
.up{border:2px dashed var(--bd);border-radius:var(--r);padding:24px;text-align:center;cursor:pointer;transition:all .12s}
.up:hover,.up.dg{border-color:var(--ac);background:rgba(0,113,227,.03)}
.up .ui{font-size:28px;opacity:.3;margin-bottom:4px}
.up p{font-size:12px;color:var(--tx2)}
.up .uh{font-size:10px;color:var(--tx2);opacity:.6;margin-top:3px}

/* ─── Queue ─── */
.qi{display:flex;align-items:center;gap:7px;padding:7px 10px;background:var(--bg);border-radius:7px;margin-bottom:5px;font-size:12px}
.qi .qn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qi .qs{color:var(--tx2);font-size:10px;white-space:nowrap}
.qi .qst{font-size:10px;white-space:nowrap}
.qi .qst.ok{color:var(--ok)}.qi .qst.er{color:var(--err)}.qi .qst.ld{color:var(--ac)}
.qi .qr{cursor:pointer;color:var(--err);font-weight:700;border:none;background:none;font-size:14px;padding:0 2px}

/* ─── Toast ─── */
.toast{position:fixed;bottom:20px;right:20px;padding:9px 18px;border-radius:9px;color:#fff;font-size:12px;font-weight:500;z-index:200;animation:ti .25s ease;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.toast.ok{background:var(--ok)}.toast.er{background:var(--err)}.toast.info{background:var(--ac)}
@keyframes ti{from{transform:translateY(16px);opacity:0}to{transform:none;opacity:1}}

/* ─── Offline ─── */
.off{position:fixed;top:0;left:0;right:0;background:var(--err);color:#fff;text-align:center;padding:5px;font-size:11px;font-weight:600;z-index:300;display:none}
.off.show{display:block}

.skel{padding:9px 11px;margin:0 8px 4px;border-radius:8px}
.skel .sk-bar{height:12px;border-radius:4px;background:rgba(255,255,255,.05);margin-bottom:7px}
.skel .sk-bar.sm{width:60%}

/* ─── Responsive ─── */
@media(max-width:768px){.sb{width:240px;min-width:240px}.mn-body{padding:14px}}
@media(max-width:520px){.app{flex-direction:column}.sb{width:100%;min-width:100%;height:45vh;flex-shrink:0}.mn{min-height:55vh}}
</style>
</head>
<body>

<div class="off" id="offBar">⚠️ 网络已断开</div>

<div class="app">
  <aside class="sb">
    <div class="sb-head">
      <h1>📋 会议纪要 <span class="cnt" id="fCnt">0</span></h1>
    </div>
    <div class="admin-bar" id="adBar">⚡ 管理模式</div>
    <div class="sb-search"><input id="sInput" placeholder="搜索…" autocomplete="off" spellcheck="false"></div>
    <div class="list" id="fList"></div>
    <div class="sb-foot" id="sbFoot">
      <button class="ba" id="btnAd">🔐 管理登录</button>
      <button class="bn" id="btnNew">＋ 新建</button>
    </div>
  </aside>
  <main class="mn" id="mn">
    <div class="mn-head hidden" id="mnHead">
      <h2 id="mnTitle"></h2>
      <div class="mn-acts hidden" id="mnActs">
        <button onclick="editCur()">✏️ 编辑</button>
        <button class="bdel" onclick="delCur()">🗑 删除</button>
      </div>
    </div>
    <div class="mn-body" id="mnBody">
      <div class="empty"><div class="ei">📋</div><p>会议纪要管理系统</p><div class="sub">选择左侧文件查看</div></div>
    </div>
  </main>
</div>

<!-- Login -->
<div class="ov" id="loginOv">
  <div class="md">
    <h2>🔐 管理员登录</h2>
    <p class="ms">输入 GitHub Token 进入管理模式</p>
    <div class="em" id="loginEm"></div>
    <div class="fg"><input type="password" id="loginTk" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off"></div>
    <div class="ma">
      <button class="bs" onclick="closeMd('loginOv')">取消</button>
      <button class="bp" id="btnLogin">登录</button>
    </div>
  </div>
</div>

<!-- New -->
<div class="ov" id="newOv">
  <div class="md">
    <h2>＋ 新建会议纪要</h2>
    <div class="fg">
      <label class="up" id="upZone" for="fileIn">
        <div class="ui">📄</div><p>点击选择或拖拽 HTML 文件</p><div class="uh">支持批量 .html/.htm</div>
      </label>
      <input type="file" id="fileIn" accept=".html,.htm" multiple style="display:none">
    </div>
    <div id="fQueue"></div>
    <div id="manIn">
      <div class="fg"><label>文件名 <span style="font-weight:400;text-transform:none;letter-spacing:0">（可选）</span></label><input type="text" id="newNm" placeholder="2024-04-22-项目评审会"></div>
      <div class="fg"><label>内容 (HTML)</label><textarea id="newCt" rows="7" placeholder="粘贴 HTML 内容…"></textarea></div>
    </div>
    <div class="ma">
      <button class="bs" onclick="closeMd('newOv')">取消</button>
      <button class="bp" id="btnSave">保存</button>
    </div>
  </div>
</div>

<!-- Edit -->
<div class="ov" id="editOv">
  <div class="md">
    <h2>✏️ 编辑</h2>
    <div class="fg"><label>文件名</label><input type="text" id="editNm"></div>
    <div class="fg"><label>内容 (HTML)</label><textarea id="editCt" rows="14"></textarea></div>
    <div class="ma">
      <button class="bs" onclick="closeMd('editOv')">取消</button>
      <button class="bp" id="btnEdit">保存修改</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════
const O='ksllove', R='shuanghuanjiyao', B='main';
const TK='jiyao_tk', CK='jiyao_ck_v3', TTL=3*60*1000;
const GH=`https://api.github.com/repos/${O}/${R}`;
const CDN=`https://cdn.jsdelivr.net/gh/${O}/${R}@${B}`;
const JSD=`https://data.jsdelivr.com/v1/packages/gh/${O}/${R}@${B}`;

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let token='', isAd=false, files=[], active=null, editing=null, queue=[];

// ═══════════════════════════════════════════════
//  UTIL
// ═══════════════════════════════════════════════
const $=id=>document.getElementById(id);
const esc=s=>{const d=document.createElement('div');d.textContent=s||'';return d.innerHTML};
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

function toast(m,t='ok'){const e=document.createElement('div');e.className='toast '+t;e.textContent=m;document.body.appendChild(e);setTimeout(()=>e.remove(),3000)}
function openMd(id){$(id).classList.add('show')}
function closeMd(id){$(id).classList.remove('show')}

async function sFetch(u,o={},ms=7000){
  const c=new AbortController(),t=setTimeout(()=>c.abort(),ms);
  try{return await fetch(u,{...o,signal:c.signal})}
  finally{clearTimeout(t)}
}

// ═══════════════════════════════════════════════
//  CACHE
// ═══════════════════════════════════════════════
function getCK(){try{const r=localStorage.getItem(CK);if(!r)return null;const c=JSON.parse(r);return Date.now()-c.t>TTL?null:c.f}catch{return null}}
function setCK(f){try{localStorage.setItem(CK,JSON.stringify({t:Date.now(),f}))}catch{}}
function delCK(){localStorage.removeItem(CK)}

// ═══════════════════════════════════════════════
//  FILE LIST — jsdelivr 优先
// ═══════════════════════════════════════════════
async function fetchList(){
  // 源1: jsdelivr data API（国内快）
  try{
    const r=await sFetch(JSD,{},6000);
    if(r.ok){
      const d=await r.json();
      const f=(d.files||[])
        .filter(x=>x.name.endsWith('.html')&&x.name!=='index.html')
        .map(x=>({name:x.name,size:x.size||0,cdn:`${CDN}/${x.name}`,gh:`https://raw.githubusercontent.com/${O}/${R}/${B}/${x.name}`}))
        .sort((a,b)=>b.name.localeCompare(a.name));
      if(f.length) return f;
      return []; // 真的没文件
    }
  }catch{}

  // 源2: GitHub API
  try{
    const r=await sFetch(`${GH}/contents/?ref=${B}`,{headers:{Accept:'application/vnd.github.v3+json'}},10000);
    if(r.ok){
      const d=await r.json();
      return d.filter(f=>f.name.endsWith('.html')&&f.name!=='index.html')
        .map(f=>({name:f.name,size:f.size||0,sha:f.sha,cdn:`${CDN}/${f.name}`,gh:f.download_url}))
        .sort((a,b)=>b.name.localeCompare(a.name));
    }
    if(r.status===403) throw new Error('API 限流，请稍后重试');
    if(r.status===404) throw new Error('仓库不存在或为私有');
  }catch(e){throw e}

  throw new Error('无法加载，请检查网络');
}

// ═══════════════════════════════════════════════
//  LOAD
// ═══════════════════════════════════════════════
async function loadFiles(){
  const el=$('fList');
  const ck=getCK();
  if(ck){files=ck;renderList();loadNet(true).catch(()=>{});return}

  el.innerHTML=Array.from({length:5},()=>
    '<div class="skel"><div class="sk-bar"></div><div class="sk-bar sm"></div></div>'
  ).join('')+'<div style="text-align:center;padding:14px;color:#565869;font-size:11px">加载中…</div>';

  await loadNet(false);
}

async function loadNet(silent){
  try{
    files=await fetchList();
    setCK(files);
    renderList();
    $('offBar').classList.remove('show');
  }catch(e){
    if(!silent)$('fList').innerHTML=
      '<div class="err" style="margin:12px 6px"><p>'+esc(e.message)+'</p><button onclick="loadFiles()">🔄 重试</button></div>';
  }
}

// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════
function renderList(q){
  q=(q||'').toLowerCase();
  const ls=files.filter(f=>f.name.toLowerCase().includes(q));
  $('fCnt').textContent=files.length;
  const el=$('fList');

  if(!ls.length){
    el.innerHTML='<div style="text-align:center;padding:28px 0;color:#565869;font-size:12px">'+
      (files.length?'无匹配':'暂无文件')+'</div>';
    return;
  }

  el.innerHTML=ls.map(f=>{
    const dt=f.name.match(/(\d{4}[-/.]\d{1,2}[-/.]\d{1,2})/);
    const d=dt?dt[1]:'';
    return '<div class="item'+(f.name===active?' on':'')+'" data-n="'+esc(f.name)+'">'+
      '<div class="ic">📄</div><div class="inf"><div class="nm">'+esc(f.name.replace(/\.html?$/i,''))+
      '</div><div class="mt">'+(d?d+' · ':'')+(f.size/1024).toFixed(1)+' KB</div></div></div>';
  }).join('');
}

// ═══════════════════════════════════════════════
//  VIEW
// ═══════════════════════════════════════════════
async function viewFile(name){
  active=name;
  renderList($('sInput').value);

  $('mnHead').classList.remove('hidden');
  $('mnTitle').textContent=name.replace(/\.html?$/i,'');
  $('mnActs').classList.toggle('hidden',!isAd);

  const body=$('mnBody');
  body.innerHTML='<div class="ld"><div class="sp"></div><p>加载中…</p></div>';

  try{
    const f=files.find(x=>x.name===name);
    if(!f)throw new Error('文件不存在');

    // CDN 优先，降级 GitHub raw
    let html;
    try{const r=await sFetch(f.cdn,{},5000);if(r.ok)html=await r.text();else throw 0}
    catch{const r=await sFetch(f.gh,{},10000);if(!r.ok)throw new Error('读取失败');html=await r.text()}

    const safe=html.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    body.innerHTML='<div class="meta"><span>📎 '+esc(name)+'</span><span>📏 '+(f.size/1024).toFixed(1)+
      ' KB</span></div><div class="card"><iframe srcdoc="'+safe+'" sandbox="allow-same-origin" onload="fit(this)"></iframe></div>';
    body.scrollTop=0;
  }catch(e){
    body.innerHTML='<div class="err"><p>'+esc(e.message)+'</p><button onclick="viewFile(\''+esc(name)+'\')">🔄 重试</button></div>';
  }
}

function fit(ifr){try{const d=ifr.contentDocument||ifr.contentWindow.document;const r=()=>{ifr.style.height=Math.max(400,d.body.scrollHeight+20)+'px'};r();if(window.ResizeObserver)new ResizeObserver(r).observe(d.body)}catch{}}

// ═══════════════════════════════════════════════
//  ADMIN
// ═══════════════════════════════════════════════
function setAd(v){
  isAd=v;
  $('sbFoot').classList.toggle('on',v);
  $('btnAd').classList.toggle('ad',v);
  $('btnAd').textContent=v?'🚪 退出管理':'🔐 管理登录';
  $('adBar').classList.toggle('on',v);
  $('mnActs').classList.toggle('hidden',!v||!active);
  if(v)localStorage.setItem(TK,token);else{localStorage.removeItem(TK);token=''}
}

// ═══════════════════════════════════════════════
//  LOGIN
// ═══════════════════════════════════════════════
$('btnAd').onclick=()=>{
  if(isAd){setAd(false);return}
  $('loginEm').textContent='';$('loginTk').value='';
  openMd('loginOv');setTimeout(()=>$('loginTk').focus(),100);
};
$('btnLogin').onclick=async()=>{
  const t=$('loginTk').value.trim();
  if(!t){$('loginEm').textContent='请输入 Token';return}
  $('loginEm').textContent='验证中…';
  try{
    const r=await sFetch(GH,{headers:{Authorization:'Bearer '+t}},10000);
    if(!r.ok){$('loginEm').textContent='Token 无效或无权限';return}
    token=t;setAd(true);closeMd('loginOv');delCK();loadFiles();toast('已进入管理模式 ✅');
  }catch{$('loginEm').textContent='网络错误'}
};
$('loginTk').onkeydown=e=>{if(e.key==='Enter')$('btnLogin').click()};
$('loginOv').onclick=e=>{if(e.target===e.currentTarget)closeMd('loginOv')};

// ═══════════════════════════════════════════════
//  GITHUB API（写操作）
// ═══════════════════════════════════════════════
async function ghApi(method,path,body){
  const r=await sFetch(`${GH}/contents/${path}`,{
    method,headers:{Authorization:'Bearer '+token,'Content-Type':'application/json',Accept:'application/vnd.github.v3+json'},
    body:JSON.stringify(body)
  },15000);
  const d=await r.json();
  if(!r.ok)throw new Error(d.message||'操作失败');
  return d;
}

// ═══════════════════════════════════════════════
//  NEW
// ═══════════════════════════════════════════════
$('btnNew').onclick=()=>{
  queue=[];$('newNm').value='';$('newCt').value='';$('fQueue').innerHTML='';$('fileIn').value='';togMan();openMd('newOv');
};
$('newOv').onclick=e=>{if(e.target===e.currentTarget)closeMd('newOv')};
function togMan(){$('manIn').style.display=queue.length?'none':''}

$('fileIn').onchange=e=>{addQ(e.target.files);e.target.value=''};
const uz=$('upZone');
uz.ondragover=e=>{e.preventDefault();uz.classList.add('dg')};
uz.ondragleave=()=>uz.classList.remove('dg');
uz.ondrop=e=>{e.preventDefault();uz.classList.remove('dg');addQ(e.dataTransfer.files)};

async function addQ(fl){
  for(const f of Array.from(fl).filter(x=>/\.html?$/i.test(x.name)))queue.push({name:f.name,content:await f.text(),size:f.size});
  if(!queue.length&&fl.length){toast('请选择 .html 文件','er');return}
  renderQ();
}
function renderQ(){
  $('fQueue').innerHTML=queue.map((f,i)=>'<div class="qi"><span class="qn">'+esc(f.name)+'</span><span class="qs">'+(f.size/1024).toFixed(1)+' KB</span><span class="qst" id="qs'+i+'"></span><button class="qr" data-r="'+i+'">✕</button></div>').join('');
  togMan();
}
$('fQueue').onclick=e=>{const b=e.target.closest('[data-r]');if(!b)return;queue.splice(+b.dataset.r,1);renderQ()};

$('btnSave').onclick=async()=>{
  const btn=$('btnSave');btn.disabled=true;
  if(queue.length){
    let ok=0,fail=0;
    for(let i=0;i<queue.length;i++){
      const f=queue[i],st=$('qs'+i);
      st.textContent='上传中…';st.className='qst ld';
      try{await ghApi('PUT',f.name,{message:'新增: '+f.name,content:btoa(unescape(encodeURIComponent(f.content)))});st.textContent='✓';st.className='qst ok';ok++}
      catch{st.textContent='✗';st.className='qst er';fail++}
    }
    toast(`完成: ${ok}成功${fail?`, ${fail}失败`:''}`,fail?'er':'ok');
  }else{
    const nm=$('newNm').value.trim(),ct=$('newCt').value.trim();
    if(!ct){toast('请输入内容','er');btn.disabled=false;return}
    const fn=(nm||new Date().toISOString().slice(0,10))+'.html';
    try{await ghApi('PUT',fn,{message:'新增: '+fn,content:btoa(unescape(encodeURIComponent(ct)))});toast('保存成功 ✅')}
    catch(e){toast('失败: '+e.message,'er');btn.disabled=false;return}
  }
  delCK();await loadFiles();closeMd('newOv');btn.disabled=false;
};

// ═══════════════════════════════════════════════
//  EDIT
// ═══════════════════════════════════════════════
async function editCur(){
  if(!active)return;editing=active;
  $('editNm').value=active;$('editCt').value='加载中…';openMd('editOv');
  try{
    const f=files.find(x=>x.name===active);if(!f)throw 0;
    let html;
    try{const r=await sFetch(f.cdn,{},5000);if(r.ok)html=await r.text();else throw 0}
    catch{const r=await sFetch(f.gh,{},10000);if(!r.ok)throw 0;html=await r.text()}
    $('editCt').value=html;
  }catch{toast('加载失败','er');$('editCt').value=''}
}
$('editOv').onclick=e=>{if(e.target===e.currentTarget)closeMd('editOv')};

$('btnEdit').onclick=async()=>{
  const nm=$('editNm').value.trim(),ct=$('editCt').value;
  if(!nm||!ct){toast('不能为空','er');return}
  const btn=$('btnEdit');btn.disabled=true;
  try{
    if(nm!==editing){const old=files.find(f=>f.name===editing);if(old.sha)await ghApi('DELETE',editing,{message:'重命名 → '+nm,sha:old.sha})}
    let sha;if(nm===editing){const old=files.find(f=>f.name===editing);sha=old?.sha}
    await ghApi('PUT',nm,{message:'更新: '+nm,content:btoa(unescape(encodeURIComponent(ct))),...(sha?{sha}:{})});
    toast('保存成功 ✅');delCK();await loadFiles();closeMd('editOv');viewFile(nm);
  }catch(e){toast('失败: '+e.message,'er')}
  btn.disabled=false;
};

// ═══════════════════════════════════════════════
//  DELETE
// ═══════════════════════════════════════════════
async function delCur(){
  if(!active||!confirm('删除「'+active+'」？不可恢复。'))return;
  try{
    // 需要 sha，先从 GitHub API 拿
    const r=await sFetch(`${GH}/contents/${active}`,{headers:{Accept:'application/vnd.github.v3+json'}},10000);
    if(!r.ok)throw new Error('获取文件信息失败');
    const d=await r.json();
    await ghApi('DELETE',active,{message:'删除: '+active,sha:d.sha});
    toast('已删除 🗑');delCK();active=null;
    $('mnHead').classList.add('hidden');
    $('mnBody').innerHTML='<div class="empty"><div class="ei">📋</div><p>选择一条会议纪要</p></div>';
    await loadFiles();
  }catch(e){toast('删除失败: '+e.message,'er')}
}

let st;$('sInput').oninput=e=>{clearTimeout(st);st=setTimeout(()=>renderList(e.target.value),150)};
