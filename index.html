<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会议纪要</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#1e1e2e;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sb{width:300px;min-width:300px;background:#1e1e2e;color:#cdd6f4;display:flex;flex-direction:column}
.sb-hd{padding:16px;border-bottom:1px solid #313244;display:flex;align-items:center;gap:8px}
.sb-hd h1{font-size:15px;font-weight:700}
.sb-hd .n{font-size:11px;color:#6c7086;margin-left:auto}
.sb-ct{padding:8px 12px}
.sb-ct input{width:100%;padding:7px 10px;background:#313244;border:1px solid #45475a;border-radius:6px;font-size:12.5px;color:#cdd6f4;outline:none}
.sb-ct input::placeholder{color:#6c7086}
.sb-ct input:focus{border-color:#89b4fa}
.sb-ls{flex:1;overflow-y:auto;padding:2px 8px}
.sb-ls::-webkit-scrollbar{width:3px}
.sb-ls::-webkit-scrollbar-thumb{background:#45475a;border-radius:3px}
.itm{padding:9px 11px;border-radius:6px;cursor:pointer;margin-bottom:1px;border-left:3px solid transparent;transition:background .1s}
.itm:hover{background:#313244}
.itm.on{background:#45475a;border-left-color:#89b4fa}
.itm .tt{font-size:12.5px;font-weight:600;color:#cdd6f4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.itm .mm{font-size:10.5px;color:#6c7086;margin-top:2px}
.sb-ft{padding:10px 12px;border-top:1px solid #313244;display:flex;gap:6px}
.sb-ft button{flex:1;padding:8px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
.btn-manage{background:#313244;color:#cdd6f4}.btn-manage:hover{background:#45475a}
.btn-new{background:#89b4fa;color:#1e1e2e;display:none}.btn-new:hover{background:#74c7ec}
.sb-ft.admin .btn-manage{background:#f38ba8;color:#1e1e2e}
.sb-ft.admin .btn-new{display:block}
.mn{flex:1;overflow-y:auto}
.mn-in{max-width:900px;margin:0 auto;padding:24px 30px 60px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;color:#585b70;gap:8px}
.empty .ei{font-size:48px;opacity:.3}
.empty p{font-size:14px}
.vh{margin-bottom:16px}
.vh h2{font-size:19px;font-weight:700;margin-bottom:6px}
.vm{display:flex;flex-wrap:wrap;gap:10px;font-size:12px;color:#585b70}
.vm span{display:flex;align-items:center;gap:3px}
.vt{display:flex;gap:6px;margin-bottom:14px}
.vt button{padding:4px 10px;border:1px solid #dce0e8;border-radius:6px;background:#fff;font-size:11.5px;cursor:pointer;color:#585b70}
.vt button:hover{background:#f0f0f0}
.vt button.btn-del:hover{background:#fee2e2;border-color:#fca5a5;color:#dc2626}
.hc{background:#fff;border-radius:10px;border:1px solid #dce0e8;overflow:hidden}
.hc iframe{width:100%;border:none;display:block;min-height:400px}
.loading{text-align:center;padding:40px;color:#6c7086}
.loading .sp{display:inline-block;width:20px;height:20px;border:2px solid #313244;border-top-color:#89b4fa;border-radius:50%;animation:spin .6s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{padding:16px;background:#45475a;border-radius:8px;color:#f38ba8;font-size:13px;margin:20px;text-align:center}
.error .retry-btn{margin-top:10px;padding:6px 16px;border:none;border-radius:6px;background:#89b4fa;color:#1e1e2e;cursor:pointer;font-weight:600;font-size:13px}
.error .retry-btn:hover{background:#74c7ec}
.error .hint{font-size:11px;color:#6c7086;margin-top:8px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(3px)}
.mo.show{display:flex}
.md{background:#fff;border-radius:16px;padding:28px;width:520px;max-width:92vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.md h2{font-size:17px;margin-bottom:4px}
.md .sub{font-size:13px;color:#666;margin-bottom:16px}
.md .err{color:#f38ba8;font-size:12px;margin-bottom:8px;min-height:18px}
.md input[type=password],.md input[type=text]{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;margin-bottom:10px;font-family:inherit}
.md input:focus{border-color:#89b4fa}
.md textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;font-family:'Menlo','Consolas',monospace;resize:vertical;min-height:180px;margin-bottom:10px}
.md textarea:focus{border-color:#89b4fa}
.md .fg{margin-bottom:12px}
.md .fg label{display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:4px}
.md .ma{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.md .ma button{padding:8px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.btn-p{background:#89b4fa;color:#1e1e2e}.btn-p:hover{background:#74c7ec}
.btn-g{background:#f1f5f9;color:#475569}.btn-g:hover{background:#e2e8f0}
.btn-g:disabled,.btn-p:disabled{opacity:.5;cursor:not-allowed}
.uz{border:2px dashed #dce0e8;border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:10px}
.uz:hover,.uz.dg{border-color:#89b4fa;background:#f0f4ff}
.uz .ui{font-size:28px;opacity:.4;margin-bottom:4px}
.uz p{font-size:13px;color:#585b70}
.uz .uh{font-size:11px;color:#adb5bd;margin-top:4px}
.fls{margin-bottom:12px}
.fl{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:6px;font-size:13px}
.fl .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fl .fsize{color:#94a3b8;font-size:11px;white-space:nowrap}
.fl .frm{cursor:pointer;color:#f38ba8;font-weight:700;padding:0 4px;border:none;background:none;font-size:14px}
.fl .frm:hover{color:#dc2626}
.fl .st{font-size:11px;white-space:nowrap}
.fl .st.ok{color:#10b981}
.fl .st.er{color:#ef4444}
.fl .st.ld{color:#3b82f6}
.toast{position:fixed;bottom:24px;right:24px;padding:10px 20px;border-radius:10px;color:#fff;font-size:13px;font-weight:500;z-index:999;animation:si .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.toast.ok{background:#10b981}.toast.err{background:#ef4444}.toast.info{background:#3b82f6}
@keyframes si{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.hidden{display:none!important}
.offline-bar{background:#f38ba8;color:#1e1e2e;text-align:center;padding:6px;font-size:12px;font-weight:600;display:none}
.offline-bar.show{display:block}
.skeleton{padding:9px 11px;margin-bottom:1px}
.skeleton .sk-bar{height:12px;border-radius:4px;background:#313244;margin-bottom:6px}
.skeleton .sk-bar.short{width:60%}
@media(max-width:768px){.sb{width:220px;min-width:220px}.mn-in{padding:14px}}
@media(max-width:480px){.app{flex-direction:column}.sb{width:100%;min-width:100%;height:auto;max-height:45vh}.sb-ls{max-height:30vh}.mn{min-height:55vh}}
</style>
</head>
<body>

<div class="offline-bar" id="offlineBar">⚠️ 网络连接异常</div>

<div class="app">
  <aside class="sb">
    <div class="sb-hd"><h1>📋 会议纪要</h1><span class="n" id="cnt"></span></div>
    <div class="sb-ct"><input id="sq" placeholder="搜索…" autocomplete="off"></div>
    <div class="sb-ls" id="ml">
      <div class="loading"><div class="sp"></div><br>加载中…</div>
    </div>
    <div class="sb-ft" id="sbFt">
      <button class="btn-manage" id="btnManage">⚙️ 管理</button>
      <button class="btn-new" id="btnNew">➕ 新建</button>
    </div>
  </aside>
  <section class="mn" id="mc">
    <div class="empty"><div class="ei">📝</div><p>选择一条会议纪要</p></div>
  </section>
</div>

<!-- Login Modal -->
<div class="mo" id="loginMo">
  <div class="md">
    <h2>🔐 管理员登录</h2>
    <p class="sub">输入 GitHub Token 进入管理模式</p>
    <div class="err" id="loginErr"></div>
    <input type="password" id="loginToken" placeholder="GitHub Personal Access Token" autocomplete="off">
    <div class="ma">
      <button class="btn-p" id="doLogin">登录</button>
      <button class="btn-g" id="cancelLogin">取消</button>
    </div>
  </div>
</div>

<!-- New Modal -->
<div class="mo" id="newMo">
  <div class="md">
    <h2>➕ 新建会议纪要</h2>
    <label class="uz" id="upZone" for="fileInput">
      <div class="ui">📄</div>
      <p>点击选择或拖拽 HTML 文件到此处</p>
      <div class="uh">支持批量选择，.html / .htm 格式</div>
    </label>
    <input type="file" id="fileInput" accept=".html,.htm" multiple style="display:none">
    <div class="fls" id="fileList"></div>
    <div class="fg" id="nameBlock">
      <label>文件名 <span style="color:#94a3b8;font-weight:400">（可选，留空用上传文件名）</span></label>
      <input type="text" id="newName" placeholder="例：2024-04-22-项目评审会">
    </div>
    <div class="fg" id="contentBlock">
      <label>内容 (HTML)</label>
      <textarea id="newContent" rows="8" placeholder="粘贴 HTML 内容，或直接上传文件…"></textarea>
    </div>
    <div class="ma">
      <button class="btn-p" id="saveNew">保存</button>
      <button class="btn-g" id="cancelNew">取消</button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="mo" id="editMo">
  <div class="md">
    <h2>✏️ 编辑会议纪要</h2>
    <div class="fg"><label>文件名</label><input type="text" id="editName"></div>
    <div class="fg"><label>内容 (HTML)</label><textarea id="editContent" rows="16"></textarea></div>
    <div class="ma">
      <button class="btn-p" id="saveEdit">保存修改</button>
      <button class="btn-g" id="cancelEdit">取消</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  配置
// ═══════════════════════════════════════════════════════════════
const OWNER      = 'ksllove';
const REPO       = 'shuanghuanjiyao';
const BRANCH     = 'main';
const TOKEN_KEY  = 'gh_token';
const CACHE_KEY  = 'gh_jiyao_cache';
const CACHE_TTL  = 5 * 60 * 1000;   // 5 分钟

// 加载渠道优先级（国内优先用 jsdelivr）
const LOAD_CHANNELS = [
  {
    name: 'jsdelivr',
    listUrl:  `https://cdn.jsdelivr.net/gh/${OWNER}/${REPO}@${BRANCH}/`,
    fileUrl:  (name) => `https://cdn.jsdelivr.net/gh/${OWNER}/${REPO}@${BRANCH}/${name}`,
    parse: parseJsDelivrTree,
  },
  {
    name: 'github-api',
    listUrl: `https://api.github.com/repos/${OWNER}/${REPO}/contents/?ref=${BRANCH}`,
    fileUrl: (name) => `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${name}`,
    parse: parseGitHubApi,
  },
];

let TOKEN = '';
let isAdmin = false;
let FILES = [];
let activeFile = null;
let editingFile = null;
let pending = [];
let currentChannel = null;

// ═══════════════════════════════════════════════════════════════
//  工具函数
// ═══════════════════════════════════════════════════════════════
function $(id) { return document.getElementById(id); }
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function toast(msg, type = 'ok') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// 带超时的 fetch
function fetchTimeout(url, opts = {}, ms = 8000) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { ...opts, signal: ctrl.signal })
    .finally(() => clearTimeout(timer));
}

// ═══════════════════════════════════════════════════════════════
//  缓存
// ═══════════════════════════════════════════════════════════════
function getCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const c = JSON.parse(raw);
    if (Date.now() - c.ts > CACHE_TTL) return null;
    return c.data;
  } catch { return null; }
}
function setCache(data) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data })); } catch {}
}
function clearCache() { localStorage.removeItem(CACHE_KEY); }

// ═══════════════════════════════════════════════════════════════
//  数据源解析
// ═══════════════════════════════════════════════════════════════

// 解析 GitHub API 返回的文件列表
function parseGitHubApi(json) {
  if (!Array.isArray(json)) return [];
  return json
    .filter(f => f.name.endsWith('.html') && f.name !== 'index.html')
    .map(f => ({
      name: f.name,
      size: f.size || 0,
      sha: f.sha,
      download_url: f.download_url,
      _channel: 'github-api',
    }))
    .sort((a, b) => b.name.localeCompare(a.name));
}

// 通过 GitHub Tree API 获取文件列表（一个请求搞定）
async function fetchViaTreeApi() {
  const url = `https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${BRANCH}?recursive=1`;
  const r = await fetchTimeout(url, {
    headers: { 'Accept': 'application/vnd.github.v3+json' }
  }, 10000);
  if (!r.ok) throw new Error('Tree API: ' + r.status);
  const data = await r.json();
  if (!data.tree) throw new Error('Tree API 返回异常');
  return data.tree
    .filter(f => f.path.endsWith('.html') && f.path !== 'index.html' && f.type === 'blob')
    .map(f => ({
      name: f.path,
      size: f.size || 0,
      sha: f.sha,
      download_url: `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${f.path}`,
      _channel: 'github-api',
    }))
    .sort((a, b) => b.name.localeCompare(a.name));
}

// jsdelivr 没有 list API，需要从 GitHub API 拿列表，但文件内容走 CDN
function parseJsDelivrTree(json) {
  // 这个函数不直接用，而是配合 GitHub API 获取列表后替换 download_url
  return parseGitHubApi(json);
}

// ═══════════════════════════════════════════════════════════════
//  核心：多渠道加载
// ═══════════════════════════════════════════════════════════════

// 检测渠道可用性（并发测试，取最快的成功渠道）
async function detectChannel() {
  const tests = [
    // jsdelivr CDN（国内快）
    fetchTimeout(`https://cdn.jsdelivr.net/gh/${OWNER}/${REPO}@${BRANCH}/index.html`, {}, 5000)
      .then(r => { if (r.ok) return 'jsdelivr'; throw 0; })
      .catch(() => null),
    // GitHub raw（备用）
    fetchTimeout(`https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/index.html`, {}, 8000)
      .then(r => { if (r.ok) return 'github-raw'; throw 0; })
      .catch(() => null),
  ];
  const results = await Promise.all(tests);
  return results.find(Boolean) || 'github-api';
}

async function loadFiles() {
  const ml = $('ml');

  // 1. 先用缓存
  const cached = getCache();
  if (cached) {
    FILES = cached;
    renderList();
    // 后台静默刷新
    loadFilesFromNetwork(true).catch(() => {});
    return;
  }

  // 2. 骨架屏
  ml.innerHTML =
    Array.from({ length: 5 }, () =>
      '<div class="skeleton"><div class="sk-bar"></div><div class="sk-bar short"></div></div>'
    ).join('') +
    '<div style="text-align:center;padding:12px;color:#6c7086;font-size:11px" id="loadStatus">正在检测最佳线路…</div>';

  await loadFilesFromNetwork(false);
}

async function loadFilesFromNetwork(silent) {
  const ml = $('ml');
  const statusEl = $('loadStatus');

  try {
    // 1) 检测最快渠道
    const channel = await detectChannel();
    currentChannel = channel;
    if (statusEl) statusEl.textContent = '通过 ' + channel + ' 加载中…';

    let files;

    if (channel === 'jsdelivr') {
      // jsdelivr 没有 list API，用 GitHub Tree API 拿列表
      // 但下载链接替换为 jsdelivr CDN
      try {
        files = await fetchViaTreeApi();
        // 替换 download_url 为 jsdelivr CDN
        files = files.map(f => ({
          ...f,
          download_url: `https://cdn.jsdelivr.net/gh/${OWNER}/${REPO}@${BRANCH}/${f.name}`,
          _channel: 'jsdelivr',
        }));
      } catch {
        // Tree API 也挂了，降级到 contents API
        files = await fetchViaContentsApi();
      }
    } else {
      files = await fetchViaContentsApi();
    }

    if (!files.length) {
      ml.innerHTML =
        '<div class="error">' +
          '暂无会议纪要文件<br>' +
          '<div class="hint">上传 .html 文件后会显示在这里</div>' +
          (isAdmin
            ? '<button class="retry-btn" onclick="showNew()">➕ 新建第一条</button>'
            : '<button class="retry-btn" onclick="loadFiles()">🔄 刷新</button>') +
        '</div>';
      FILES = [];
      return;
    }

    FILES = files;
    setCache(FILES);
    renderList();
    $('offlineBar').classList.remove('show');

  } catch (e) {
    if (!silent) {
      const msg = e.name === 'AbortError'
        ? '请求超时，网络可能不稳定'
        : (e.message || '加载失败');
      ml.innerHTML =
        '<div class="error">' +
          esc(msg) +
          '<div class="hint">💡 国内访问 GitHub 可能不稳定，已自动尝试多个线路</div>' +
          '<button class="retry-btn" onclick="loadFiles()">🔄 重试</button>' +
        '</div>';
    }
  }
}

// GitHub Contents API（原始方式）
async function fetchViaContentsApi() {
  const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/?ref=${BRANCH}`;
  const r = await fetchTimeout(url, {
    headers: {
      'Accept': 'application/vnd.github.v3+json',
      ...(TOKEN ? { 'Authorization': 'Bearer ' + TOKEN } : {}),
    }
  }, 10000);

  if (r.status === 403) throw new Error('API 请求次数已达上限（未认证每小时 60 次），请稍后重试或登录 Token');
  if (r.status === 404) throw new Error('仓库不存在或为私有仓库');
  if (!r.ok) throw new Error('GitHub API 错误 (' + r.status + ')');

  const data = await r.json();
  return parseGitHubApi(data);
}

// ═══════════════════════════════════════════════════════════════
//  渲染
// ═══════════════════════════════════════════════════════════════
function renderList(q) {
  q = (q || '').toLowerCase();
  const list = FILES.filter(f => f.name.toLowerCase().includes(q));
  $('cnt').textContent = '· ' + FILES.length;
  const el = $('ml');

  if (!list.length) {
    el.innerHTML = '<div style="text-align:center;padding:24px 0;color:#6c7086;font-size:12px">' +
      (FILES.length ? '无匹配结果' : '暂无会议纪要') + '</div>';
    return;
  }

  el.innerHTML = list.map(f =>
    '<div class="itm' + (f.name === activeFile ? ' on' : '') + '" data-file="' + esc(f.name) + '">' +
      '<div class="tt">' + esc(f.name.replace(/\.html?$/i, '')) + '</div>' +
      '<div class="mm">' + (f.size / 1024).toFixed(1) + ' KB</div>' +
    '</div>'
  ).join('');
}

async function viewFile(name) {
  activeFile = name;
  renderList($('sq').value);
  const mc = $('mc');
  mc.innerHTML = '<div class="loading"><div class="sp"></div><br>加载中…</div>';
  mc.scrollTop = 0;

  try {
    const file = FILES.find(f => f.name === name);
    if (!file) throw new Error('文件不存在');

    const r = await fetchTimeout(file.download_url, {}, 10000);
    if (!r.ok) throw new Error('读取失败 (' + r.status + ')');
    const html = await r.text();
    const title = name.replace(/\.html?$/i, '');

    const safeHtml = html
      .replace(/&/g, '&amp;')
      .replace(/"/g, '&quot;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    mc.innerHTML =
      '<div class="mn-in">' +
        '<div class="vh">' +
          '<h2>' + esc(title) + '</h2>' +
          '<div class="vm">' +
            '<span>📎 ' + esc(name) + '</span>' +
            '<span>📏 ' + (file.size / 1024).toFixed(1) + ' KB</span>' +
          '</div>' +
        '</div>' +
        (isAdmin
          ? '<div class="vt">' +
              '<button onclick="showEdit(\'' + esc(name) + '\')">✏️ 编辑</button>' +
              '<button class="btn-del" onclick="doDelete(\'' + esc(name) + '\')">🗑 删除</button>' +
            '</div>'
          : '') +
        '<div class="hc">' +
          '<iframe id="ifr" srcdoc="' + safeHtml + '" sandbox="allow-same-origin" onload="fitIframe(this)"></iframe>' +
        '</div>' +
      '</div>';
  } catch (e) {
    mc.innerHTML =
      '<div class="error">' +
        '加载失败: ' + esc(e.message) +
        '<br><button class="retry-btn" onclick="viewFile(\'' + esc(name) + '\')">重试</button>' +
      '</div>';
  }
}

function fitIframe(iframe) {
  try {
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    const rs = () => { iframe.style.height = Math.max(400, doc.body.scrollHeight + 20) + 'px'; };
    rs();
    if (window.ResizeObserver) new ResizeObserver(rs).observe(doc.body);
    else setInterval(rs, 500);
  } catch {}
}

// ═══════════════════════════════════════════════════════════════
//  管理员
// ═══════════════════════════════════════════════════════════════
function enterAdmin() {
  isAdmin = true;
  $('sbFt').classList.add('admin');
  $('btnManage').textContent = '🚪 退出管理';
  if (activeFile) viewFile(activeFile);
}
function exitAdmin() {
  isAdmin = false;
  localStorage.removeItem(TOKEN_KEY);
  TOKEN = '';
  $('sbFt').classList.remove('admin');
  $('btnManage').textContent = '⚙️ 管理';
  if (activeFile) viewFile(activeFile);
}

// ═══════════════════════════════════════════════════════════════
//  登录
// ═══════════════════════════════════════════════════════════════
function showLogin() {
  $('loginMo').classList.add('show');
  $('loginErr').textContent = '';
  $('loginToken').value = '';
  setTimeout(() => $('loginToken').focus(), 100);
}
function hideLogin() { $('loginMo').classList.remove('show'); }

$('doLogin').onclick = async () => {
  const t = $('loginToken').value.trim();
  if (!t) { $('loginErr').textContent = '请输入 Token'; return; }
  $('loginErr').textContent = '验证中…';
  try {
    const r = await fetchTimeout(`https://api.github.com/repos/${OWNER}/${REPO}`, {
      headers: { Authorization: 'Bearer ' + t }
    }, 10000);
    if (!r.ok) { $('loginErr').textContent = 'Token 无效或无权限'; return; }
    TOKEN = t;
    localStorage.setItem(TOKEN_KEY, t);
    hideLogin();
    enterAdmin();
    clearCache();
    loadFiles();
    toast('已进入管理模式');
  } catch { $('loginErr').textContent = '验证失败，请检查网络'; }
};
$('loginToken').onkeydown = e => { if (e.key === 'Enter') $('doLogin').click(); };
$('cancelLogin').onclick = hideLogin;

// ═══════════════════════════════════════════════════════════════
//  新建（支持批量）
// ═══════════════════════════════════════════════════════════════
function showNew() {
  pending = [];
  $('newName').value = '';
  $('newContent').value = '';
  $('fileList').innerHTML = '';
  $('fileInput').value = '';
  updateNewUI();
  $('newMo').classList.add('show');
}
function hideNew() { $('newMo').classList.remove('show'); }

function updateNewUI() {
  const has = pending.length > 0;
  $('nameBlock').style.display = has ? 'none' : '';
  $('contentBlock').style.display = has ? 'none' : '';
}

$('fileInput').onchange = e => { addFiles(e.target.files); e.target.value = ''; };

const uz = $('upZone');
uz.ondragover = e => { e.preventDefault(); uz.classList.add('dg'); };
uz.ondragleave = () => uz.classList.remove('dg');
uz.ondrop = e => { e.preventDefault(); uz.classList.remove('dg'); addFiles(e.dataTransfer.files); };

async function addFiles(fileList) {
  const arr = Array.from(fileList).filter(f => /\.html?$/i.test(f.name));
  if (!arr.length) { toast('请选择 .html 文件', 'err'); return; }
  for (const f of arr) {
    const content = await f.text();
    pending.push({ name: f.name, content, size: f.size });
  }
  renderPending();
}

function renderPending() {
  $('fileList').innerHTML = pending.map((f, i) =>
    '<div class="fl">' +
      '<span class="fname">' + esc(f.name) + '</span>' +
      '<span class="fsize">' + (f.size / 1024).toFixed(1) + ' KB</span>' +
      '<span class="st" id="fs' + i + '"></span>' +
      '<button class="frm" data-rm="' + i + '">✕</button>' +
    '</div>'
  ).join('');
  updateNewUI();
}

$('fileList').onclick = e => {
  const btn = e.target.closest('[data-rm]');
  if (!btn) return;
  pending.splice(+btn.dataset.rm, 1);
  renderPending();
};

$('saveNew').onclick = async () => {
  if (pending.length) {
    let ok = 0, fail = 0;
    for (let i = 0; i < pending.length; i++) {
      const f = pending[i];
      const st = $('fs' + i);
      st.textContent = '上传中…'; st.className = 'st ld';
      try {
        await ghApi('PUT', f.name, {
          message: '新增会议纪要: ' + f.name,
          content: btoa(unescape(encodeURIComponent(f.content))),
        });
        st.textContent = '✓'; st.className = 'st ok'; ok++;
      } catch (e) {
        st.textContent = '✗ ' + (e.message || '失败'); st.className = 'st er'; fail++;
      }
    }
    toast('上传完成: ' + ok + ' 成功' + (fail ? ', ' + fail + ' 失败' : ''), fail ? 'err' : 'ok');
    clearCache(); loadFiles(); hideNew();
  } else {
    const name = $('newName').value.trim();
    const content = $('newContent').value.trim();
    if (!content) { toast('请输入内容', 'err'); return; }
    const fileName = (name || new Date().toISOString().slice(0, 10)) + '.html';
    try {
      await ghApi('PUT', fileName, {
        message: '新增会议纪要: ' + fileName,
        content: btoa(unescape(encodeURIComponent(content))),
      });
      toast('保存成功'); clearCache(); loadFiles(); hideNew();
    } catch (e) { toast('保存失败: ' + e.message, 'err'); }
  }
};
$('cancelNew').onclick = hideNew;

// ═══════════════════════════════════════════════════════════════
//  GitHub API（写操作用，需要 Token）
// ═══════════════════════════════════════════════════════════════
async function ghApi(method, path, body) {
  const r = await fetchTimeout(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
    method,
    headers: {
      'Authorization': 'Bearer ' + TOKEN,
      'Content-Type': 'application/json',
      'Accept': 'application/vnd.github.v3+json',
    },
    body: JSON.stringify(body),
  }, 15000);
  const d = await r.json();
  if (!r.ok) throw new Error(d.message || 'API 错误');
  return d;
}

// ═══════════════════════════════════════════════════════════════
//  编辑
// ═══════════════════════════════════════════════════════════════
async function showEdit(name) {
  editingFile = name;
  $('editName').value = name;
  $('editContent').value = '加载中…';
  $('editMo').classList.add('show');
  try {
    const file = FILES.find(f => f.name === name);
    if (!file) throw new Error('文件不存在');
    const r = await fetchTimeout(file.download_url, {}, 10000);
    if (!r.ok) throw new Error('读取失败');
    $('editContent').value = await r.text();
  } catch (e) { $('editContent').value = ''; toast('加载失败: ' + e.message, 'err'); }
}

$('saveEdit').onclick = async () => {
  const newName = $('editName').value.trim();
  const content = $('editContent').value;
  if (!newName || !content) { toast('文件名和内容不能为空', 'err'); return; }
  try {
    if (newName !== editingFile) {
      const old = FILES.find(f => f.name === editingFile);
      if (old) await ghApi('DELETE', editingFile, { message: '重命名: ' + editingFile + ' → ' + newName, sha: old.sha });
    }
    let sha;
    if (newName === editingFile) { const old = FILES.find(f => f.name === editingFile); sha = old ? old.sha : undefined; }
    await ghApi('PUT', newName, {
      message: '更新会议纪要: ' + newName,
      content: btoa(unescape(encodeURIComponent(content))),
      ...(sha ? { sha } : {}),
    });
    toast('保存成功'); clearCache(); loadFiles();
    $('editMo').classList.remove('show');
    if (activeFile === editingFile) viewFile(newName);
  } catch (e) { toast('保存失败: ' + e.message, 'err'); }
};
$('cancelEdit').onclick = () => $('editMo').classList.remove('show');

// ═══════════════════════════════════════════════════════════════
//  删除
// ═══════════════════════════════════════════════════════════════
async function doDelete(name) {
  if (!confirm('确定删除「' + name + '」吗？此操作不可撤销。')) return;
  try {
    const file = FILES.find(f => f.name === name);
    if (!file) throw new Error('文件不存在');
    await ghApi('DELETE', name, { message: '删除会议纪要: ' + name, sha: file.sha });
    toast('已删除'); clearCache(); activeFile = null; loadFiles();
    $('mc').innerHTML = '<div class="empty"><div class="ei">📝</div><p>选择一条会议纪要</p></div>';
  } catch (e) { toast('删除失败: ' + e.message, 'err'); }
}

// ═══════════════════════════════════════════════════════════════
//  事件
// ═══════════════════════════════════════════════════════════════
$('btnManage').onclick = () => { if (isAdmin) exitAdmin(); else showLogin(); };
$('btnNew').onclick = showNew;

$('ml').onclick = e => {
  const item = e.target.closest('.itm');
  if (item) viewFile(item.dataset.file);
};

let searchTimer;
$('sq').oninput = e => { clearTimeout(searchTimer); searchTimer = setTimeout(() => renderList(e.target.value), 200); };

document.querySelectorAll('.mo').forEach(mo => {
  mo.onclick = e => { if (e.target === mo) mo.classList.remove('show'); };
});

window.addEventListener('online', () => $('offlineBar').classList.remove('show'));
window.addEventListener('offline', () => { $('offlineBar').classList.add('show'); $('offlineBar').textContent = '⚠️ 网络已断开'; });

// ═══════════════════════════════════════════════════════════════
//  初始化
// ═══════════════════════════════════════════════════════════════
(function init() {
  const saved = localStorage.getItem(TOKEN_KEY);
  if (saved) { TOKEN = saved; enterAdmin(); }
  loadFiles();
})();
</script>
</body>
