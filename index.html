<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会议纪要</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#1e1e2e;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sb{width:300px;min-width:300px;background:#1e1e2e;color:#cdd6f4;display:flex;flex-direction:column}
.sb-hd{padding:16px;border-bottom:1px solid #313244;display:flex;align-items:center;gap:8px}
.sb-hd h1{font-size:15px;font-weight:700}
.sb-hd .n{font-size:11px;color:#6c7086;margin-left:auto}
.sb-ct{padding:8px 12px}
.sb-ct input{width:100%;padding:7px 10px;background:#313244;border:1px solid #45475a;border-radius:6px;font-size:12.5px;color:#cdd6f4;outline:none}
.sb-ct input::placeholder{color:#6c7086}
.sb-ct input:focus{border-color:#89b4fa}
.sb-ls{flex:1;overflow-y:auto;padding:2px 8px}
.sb-ls::-webkit-scrollbar{width:3px}
.sb-ls::-webkit-scrollbar-thumb{background:#45475a;border-radius:3px}
.itm{padding:9px 11px;border-radius:6px;cursor:pointer;margin-bottom:1px;border-left:3px solid transparent;transition:background .1s}
.itm:hover{background:#313244}
.itm.on{background:#45475a;border-left-color:#89b4fa}
.itm .tt{font-size:12.5px;font-weight:600;color:#cdd6f4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.itm .mm{font-size:10.5px;color:#6c7086;margin-top:2px}
.sb-ft{padding:10px 12px;border-top:1px solid #313244;display:flex;gap:6px}
.sb-ft button{flex:1;padding:8px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
.btn-manage{background:#313244;color:#cdd6f4}.btn-manage:hover{background:#45475a}
.btn-new{background:#89b4fa;color:#1e1e2e;display:none}.btn-new:hover{background:#74c7ec}
.sb-ft.admin .btn-manage{background:#f38ba8;color:#1e1e2e}
.sb-ft.admin .btn-new{display:block}
.mn{flex:1;overflow-y:auto}
.mn-in{max-width:900px;margin:0 auto;padding:24px 30px 60px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;color:#585b70;gap:8px}
.empty .ei{font-size:48px;opacity:.3}
.empty p{font-size:14px}
.vh{margin-bottom:16px}
.vh h2{font-size:19px;font-weight:700;margin-bottom:6px}
.vm{display:flex;flex-wrap:wrap;gap:10px;font-size:12px;color:#585b70}
.vm span{display:flex;align-items:center;gap:3px}
.vt{display:flex;gap:6px;margin-bottom:14px}
.vt button{padding:4px 10px;border:1px solid #dce0e8;border-radius:6px;background:#fff;font-size:11.5px;cursor:pointer;color:#585b70}
.vt button:hover{background:#f0f0f0}
.vt button.btn-del:hover{background:#fee2e2;border-color:#fca5a5;color:#dc2626}
.hc{background:#fff;border-radius:10px;border:1px solid #dce0e8;overflow:hidden}
.hc iframe{width:100%;border:none;display:block;min-height:400px}
.loading{text-align:center;padding:40px;color:#6c7086}
.loading .sp{display:inline-block;width:20px;height:20px;border:2px solid #313244;border-top-color:#89b4fa;border-radius:50%;animation:spin .6s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{padding:16px;background:#45475a;border-radius:8px;color:#f38ba8;font-size:13px;margin:20px;text-align:center}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(3px)}
.mo.show{display:flex}
.md{background:#fff;border-radius:16px;padding:28px;width:520px;max-width:92vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.md h2{font-size:17px;margin-bottom:4px}
.md .sub{font-size:13px;color:#666;margin-bottom:16px}
.md .err{color:#f38ba8;font-size:12px;margin-bottom:8px;min-height:18px}
.md input[type=password],.md input[type=text]{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;margin-bottom:10px;font-family:inherit}
.md input:focus{border-color:#89b4fa}
.md textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;font-family:'Menlo','Consolas',monospace;resize:vertical;min-height:180px;margin-bottom:10px}
.md textarea:focus{border-color:#89b4fa}
.md .fg{margin-bottom:12px}
.md .fg label{display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:4px}
.md .ma{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.md .ma button{padding:8px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.btn-p{background:#89b4fa;color:#1e1e2e}.btn-p:hover{background:#74c7ec}
.btn-g{background:#f1f5f9;color:#475569}.btn-g:hover{background:#e2e8f0}
.uz{border:2px dashed #dce0e8;border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:10px}
.uz:hover,.uz.dg{border-color:#89b4fa;background:#f0f4ff}
.uz .ui{font-size:28px;opacity:.4;margin-bottom:4px}
.uz p{font-size:13px;color:#585b70}
.uz .uh{font-size:11px;color:#adb5bd;margin-top:4px}
.fls{margin-bottom:12px}
.fl{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:6px;font-size:13px}
.fl .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fl .fsize{color:#94a3b8;font-size:11px;white-space:nowrap}
.fl .frm{cursor:pointer;color:#f38ba8;font-weight:700;padding:0 4px;border:none;background:none;font-size:14px}
.fl .frm:hover{color:#dc2626}
.fl .st{font-size:11px;white-space:nowrap}
.fl .st.ok{color:#10b981}
.fl .st.er{color:#ef4444}
.fl .st.ld{color:#3b82f6}
.toast{position:fixed;bottom:24px;right:24px;padding:10px 20px;border-radius:10px;color:#fff;font-size:13px;font-weight:500;z-index:999;animation:si .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.toast.ok{background:#10b981}.toast.err{background:#ef4444}.toast.info{background:#3b82f6}
@keyframes si{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.hidden{display:none!important}
@media(max-width:768px){.sb{width:220px;min-width:220px}.mn-in{padding:14px}}
</style>
</head>
<body>
<div class="app">
  <aside class="sb">
    <div class="sb-hd"><h1>📋 会议纪要</h1><span class="n" id="cnt"></span></div>
    <div class="sb-ct"><input id="sq" placeholder="搜索…"></div>
    <div class="sb-ls" id="ml"><div class="loading"><div class="sp"></div><br>加载中…</div></div>
    <div class="sb-ft" id="sbFt">
      <button class="btn-manage" id="btnManage">⚙️ 管理</button>
      <button class="btn-new" id="btnNew">➕ 新建</button>
    </div>
  </aside>
  <section class="mn" id="mc">
    <div class="empty"><div class="ei">📝</div><p>选择一条会议纪要</p></div>
  </section>
</div>

<!-- Login Modal -->
<div class="mo" id="loginMo">
  <div class="md">
    <h2>🔐 管理员登录</h2>
    <p class="sub">输入 GitHub Token 进入管理模式</p>
    <div class="err" id="loginErr"></div>
    <input type="password" id="loginToken" placeholder="GitHub Personal Access Token">
    <div class="ma">
      <button class="btn-p" id="doLogin">登录</button>
      <button class="btn-g" id="cancelLogin">取消</button>
    </div>
  </div>
</div>

<!-- New Modal -->
<div class="mo" id="newMo">
  <div class="md">
    <h2>➕ 新建会议纪要</h2>
    <label class="uz" id="upZone" for="fileInput">
      <div class="ui">📄</div>
      <p>点击选择或拖拽 HTML 文件到此处</p>
      <div class="uh">支持批量选择，.html / .htm 格式</div>
    </label>
    <input type="file" id="fileInput" accept=".html,.htm" multiple style="display:none">
    <div class="fls" id="fileList"></div>
    <div class="fg" id="nameBlock">
      <label>文件名 <span style="color:#94a3b8;font-weight:400">（可选，留空用上传文件名）</span></label>
      <input type="text" id="newName" placeholder="例：2024-04-22-项目评审会">
    </div>
    <div class="fg" id="contentBlock">
      <label>内容 (HTML)</label>
      <textarea id="newContent" rows="8" placeholder="粘贴 HTML 内容，或直接上传文件…"></textarea>
    </div>
    <div class="ma">
      <button class="btn-p" id="saveNew">保存</button>
      <button class="btn-g" id="cancelNew">取消</button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="mo" id="editMo">
  <div class="md">
    <h2>✏️ 编辑会议纪要</h2>
    <div class="fg"><label>文件名</label><input type="text" id="editName"></div>
    <div class="fg"><label>内容 (HTML)</label><textarea id="editContent" rows="16"></textarea></div>
    <div class="ma">
      <button class="btn-p" id="saveEdit">保存修改</button>
      <button class="btn-g" id="cancelEdit">取消</button>
    </div>
  </div>
</div>

<script>
const API='https://api.github.com',OWNER='ksllove',REPO='shuanghuanjiyao',BRANCH='main',TK='gh_admin_token';
let TOKEN='',isAdmin=false,FILES=[],activeFile=null,editingFile=null,pending=[];

function $(id){return document.getElementById(id)}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function toast(m,t='ok'){const e=document.createElement('div');e.className='toast '+t;e.textContent=m;document.body.appendChild(e);setTimeout(()=>e.remove(),3000)}

async function ghApi(method,path,body){
  const o={method,headers:{Authorization:'Bearer '+TOKEN,'Content-Type':'application/json',Accept:'application/vnd.github.v3+json'}};
  if(body)o.body=JSON.stringify(body);
  const r=await fetch(API+'/repos/'+OWNER+'/'+REPO+'/contents/'+path,o);
  const d=await r.json();if(!r.ok)throw new Error(d.message||'API错误');return d;
}

// ─── Load ───
async function loadFiles(){
  try{
    const r=await fetch(API+'/repos/'+OWNER+'/'+REPO+'/contents/?ref='+BRANCH);
    if(!r.ok)throw new Error('加载失败');
    FILES=(await r.json()).filter(f=>f.name.endsWith('.html')&&f.name!=='index.html').sort((a,b)=>b.name.localeCompare(a.name));
    renderList();
  }catch(e){
    $('ml').innerHTML='<div class="error">加载失败<br><button onclick="loadFiles()" style="margin-top:8px;padding:6px 16px;border:none;border-radius:6px;background:#89b4fa;color:#1e1e2e;cursor:pointer">重试</button></div>';
  }
}

function renderList(q){
  q=(q||'').toLowerCase();
  const list=FILES.filter(f=>f.name.toLowerCase().includes(q));
  $('cnt').textContent='· '+FILES.length;
  const el=$('ml');
  if(!list.length){el.innerHTML='<div style="text-align:center;padding:24px 0;color:#6c7086;font-size:12px">暂无会议纪要</div>';return}
  el.innerHTML=list.map(f=>'<div class="itm'+(f.name===activeFile?' on':'')+'" data-file="'+esc(f.name)+'"><div class="tt">'+esc(f.name.replace(/\.html?$/i,''))+'</div><div class="mm">'+(f.size/1024).toFixed(1)+' KB</div></div>').join('');
}

async function viewFile(name){
  activeFile=name;renderList($('sq').value);
  const mc=$('mc');mc.innerHTML='<div class="loading"><div class="sp"></div><br>加载中…</div>';mc.scrollTop=0;
  try{
    const file=FILES.find(f=>f.name===name);if(!file)throw new Error('文件不存在');
    const r=await fetch(file.download_url);if(!r.ok)throw new Error('读取失败');
    const html=await r.text(),title=name.replace(/\.html?$/i,'');
    mc.innerHTML='<div class="mn-in"><div class="vh"><h2>'+esc(title)+'</h2><div class="vm"><span>📎 '+esc(name)+'</span><span>📏 '+(file.size/1024).toFixed(1)+' KB</span></div></div>'+(isAdmin?'<div class="vt"><button onclick="showEdit(\''+esc(name)+'\')">✏️ 编辑</button><button class="btn-del" onclick="doDelete(\''+esc(name)+'\')">🗑 删除</button></div>':'')+'<div class="hc"><iframe id="ifr" srcdoc="'+html.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'" onload="fitIframe(this)"></iframe></div></div>';
  }catch(e){mc.innerHTML='<div class="error">加载失败: '+esc(e.message)+'</div>'}
}

function fitIframe(iframe){
  try{const doc=iframe.contentDocument||iframe.contentWindow.document;
  const rs=()=>{iframe.style.height=Math.max(400,doc.body.scrollHeight+20)+'px'};rs();new ResizeObserver(rs).observe(doc.body)}catch(e){}
}

// ─── Admin ───
function enterAdmin(){isAdmin=true;$('sbFt').classList.add('admin');$('btnManage').textContent='🚪 退出管理';if(activeFile)viewFile(activeFile)}
function exitAdmin(){isAdmin=false;localStorage.removeItem(TK);TOKEN='';$('sbFt').classList.remove('admin');$('btnManage').textContent='⚙️ 管理';if(activeFile)viewFile(activeFile)}

// ─── Login ───
function showLogin(){$('loginMo').classList.add('show');$('loginErr').textContent='';$('loginToken').value='';setTimeout(()=>$('loginToken').focus(),100)}
function hideLogin(){$('loginMo').classList.remove('show')}

$('doLogin').onclick=async()=>{
  const t=$('loginToken').value.trim();
  if(!t){$('loginErr').textContent='请输入 Token';return}
  $('loginErr').textContent='验证中…';
  try{const r=await fetch(API+'/repos/'+OWNER+'/'+REPO,{headers:{Authorization:'Bearer '+t}});
  if(!r.ok){$('loginErr').textContent='Token 无效或无权限';return}
  TOKEN=t;localStorage.setItem(TK,t);hideLogin();enterAdmin();toast('已进入管理模式')}catch{$('loginErr').textContent='验证失败'}
};
$('loginToken').onkeydown=e=>{if(e.key==='Enter')$('doLogin').click()};
$('cancelLogin').onclick=hideLogin;

// ─── New (batch) ───
function showNew(){
  pending=[];
  $('newName').value='';
  $('newContent').value='';
  $('fileList').innerHTML='';
  $('fileInput').value='';
  updateNewUI();
  $('newMo').classList.add('show');
}
function hideNew(){$('newMo').classList.remove('show')}

function updateNewUI(){
  const has=pending.length>0;
  $('nameBlock').style.display=has?'none':'';
  $('contentBlock').style.display=has?'none':'';
  $('saveNew').disabled=false; // always enabled: can save manual content or uploaded files
}

$('fileInput').onchange=e=>{addFiles(e.target.files);e.target.value=''};

// Drag & drop on zone
const uz=$('upZone');
uz.ondragover=e=>{e.preventDefault();uz.classList.add('dg')};
uz.ondragleave=()=>uz.classList.remove('dg');
uz.ondrop=e=>{e.preventDefault();uz.classList.remove('dg');addFiles(e.dataTransfer.files)};

async function addFiles(fileList){
  const arr=Array.from(fileList).filter(f=>/\.html?$/i.test(f.name));
  if(!arr.length){toast('请选择 .html 文件','err');return}
  for(const f of arr){
    const content=await f.text();
    pending.push({name:f.name,content,size:f.size});
  }
  renderPending();
}

function renderPending(){
  const el=$('fileList');
  el.innerHTML=pending.map((f,i)=>'<div class="fl"><span class="fname">'+esc(f.name)+'</span><span class="fsize">'+(f.size/1024).toFixed(1)+' KB</span><span class="st" id="fs'+i+'"></span><button class="frm" data-rm="'+i+'">✕</button></div>').join('');
  updateNewUI();
}

$('fileList').onclick=e=>{
  const b=e.target.closest('[data-rm]');
  if(b){pending.splice(+b.dataset.rm,1);renderPending()}
};

$('saveNew').onclick=async()=>{
  // If no uploaded files, try manual input
  if(!pending.length){
    const name=$('newName').value.trim(),content=$('newContent').value.trim();
    if(!content){toast('请上传文件或填写内容','err');return}
    const fname=name?(name.endsWith('.html')?name:name+'.html'):'未命名-'+Date.now()+'.html';
    pending.push({name:fname,content,size:content.length});
  }
  const btn=$('saveNew');btn.textContent='上传中…';btn.disabled=true;
  let ok=0,fail=0;
  for(let i=0;i<pending.length;i++){
    const f=pending[i],st=$('fs'+i);
    if(st){st.textContent='上传中…';st.className='st ld'}
    try{
      await ghApi('PUT',encodeURIComponent(f.name),{message:'添加会议纪要: '+f.name,content:btoa(unescape(encodeURIComponent(f.content))),branch:BRANCH});
      if(st){st.textContent='✓';st.className='st ok'}ok++
    }catch(e){
      if(st){st.textContent='失败';st.className='st er'}fail++
    }
    if(i<pending.length-1)await new Promise(r=>setTimeout(r,400));
  }
  if(fail===0){toast('全部 '+ok+' 个文件上传成功！');hideNew()}
  else toast(ok+' 成功，'+fail+' 失败',fail>0?'err':'ok');
  btn.textContent='保存';btn.disabled=false;await loadFiles();
};
$('cancelNew').onclick=hideNew;

// ─── Edit ───
function showEdit(name){
  const file=FILES.find(f=>f.name===name);if(!file)return;
  editingFile={name,sha:file.sha};
  $('editName').value=name;
  $('editContent').value='加载中…';
  $('editMo').classList.add('show');
  fetch(file.download_url).then(r=>r.text()).then(t=>{$('editContent').value=t}).catch(()=>{$('editContent').value='加载失败'});
}
function hideEdit(){$('editMo').classList.remove('show');editingFile=null}

$('saveEdit').onclick=async()=>{
  let newName=$('editName').value.trim(),content=$('editContent').value;
  if(!newName){toast('请输入文件名','err');return}
  if(!newName.endsWith('.html'))newName+='.html';
  const btn=$('saveEdit');btn.textContent='保存中…';btn.disabled=true;
  try{
    if(newName!==editingFile.name){
      await ghApi('DELETE',encodeURIComponent(editingFile.name),{message:'重命名 '+editingFile.name+' → '+newName,sha:editingFile.sha,branch:BRANCH});
      await ghApi('PUT',encodeURIComponent(newName),{message:'重命名 '+editingFile.name+' → '+newName,content:btoa(unescape(encodeURIComponent(content))),branch:BRANCH});
    }else{
      await ghApi('PUT',encodeURIComponent(editingFile.name),{message:'更新会议纪要: '+editingFile.name,content:btoa(unescape(encodeURIComponent(content))),sha:editingFile.sha,branch:BRANCH});
    }
    toast('保存成功！');hideEdit();await loadFiles();activeFile=newName;viewFile(newName);
  }catch(e){toast('保存失败: '+e.message,'err');btn.textContent='保存修改';btn.disabled=false}
};
$('cancelEdit').onclick=hideEdit;

// ─── Delete ───
async function doDelete(name){
  const file=FILES.find(f=>f.name===name);if(!file)return;
  if(!confirm('确定删除 "'+name.replace(/\.html?$/i,'')" ？\n此操作不可撤销！'))return;
  try{
    await ghApi('DELETE',encodeURIComponent(name),{message:'删除会议纪要: '+name,sha:file.sha,branch:BRANCH});
    toast('已删除');activeFile=null;
    $('mc').innerHTML='<div class="empty"><div class="ei">📝</div><p>选择一条会议纪要</p></div>';
    await loadFiles();
  }catch(e){toast('删除失败: '+e.message,'err')}
}

// ─── Events ───
$('btnManage').onclick=()=>{if(isAdmin)exitAdmin();else showLogin()};
$('btnNew').onclick=showNew;
$('sq').oninput=e=>renderList(e.target.value);
document.addEventListener('click',e=>{const it=e.target.closest('.itm[data-file]');if(it)viewFile(it.dataset.file)});

// ─── Init ───
(async()=>{
  const s=localStorage.getItem(TK);
  if(s){try{const r=await fetch(API+'/repos/'+OWNER+'/'+REPO,{headers:{Authorization:'Bearer '+s}});if(r.ok){TOKEN=s;enterAdmin()}}catch{}}
  await loadFiles();
})();
</script>
</body>
</html>
