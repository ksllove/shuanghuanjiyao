<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HTML 文件管理器 Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#0f0f1a;color:#e0e0e0;height:100vh;overflow:hidden;display:flex}
.side{width:300px;min-width:300px;background:#16162a;display:flex;flex-direction:column;border-right:1px solid #2a2a45}
.side h1{font-size:16px;padding:18px 16px;border-bottom:1px solid #2a2a45;color:#fff;display:flex;align-items:center;gap:8px}
.side h1 small{font-size:11px;color:#666;margin-left:auto;font-weight:400;background:#2a2a45;padding:2px 8px;border-radius:10px}
.srch{padding:10px 12px}
.srch input{width:100%;padding:9px 12px;background:#1e1e38;border:1px solid #2a2a45;border-radius:8px;color:#ccc;font-size:13px;outline:none}
.srch input::placeholder{color:#555}
.srch input:focus{border-color:#6c5ce7;box-shadow:0 0 0 3px rgba(108,92,231,.15)}
.list{flex:1;overflow-y:auto;padding:0 8px}
.list::-webkit-scrollbar{width:4px}.list::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
.fi{padding:12px 14px;border-radius:8px;cursor:pointer;margin-bottom:2px;border-left:3px solid transparent;transition:.15s}
.fi:hover{background:#1e1e38}.fi.on{background:#252545;border-left-color:#6c5ce7}
.fi .fn{font-size:13px;font-weight:600;color:#ddd;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fi .fm{font-size:11px;color:#666;margin-top:3px}
.sfoot{padding:12px;border-top:1px solid #2a2a45;display:flex;gap:8px}
.sfoot button{flex:1;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,#6c5ce7,#a855f7);color:#fff}
.btn-primary:hover{filter:brightness(1.1)}
.btn-outline{background:transparent;border:1px solid #3a3a55!important;color:#aaa}
.btn-outline:hover{border-color:#6c5ce7!important;color:#fff}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.mtop{padding:14px 24px;background:#16162a;border-bottom:1px solid #2a2a45;display:flex;align-items:center;gap:12px;min-height:54px}
.mtop h2{font-size:16px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#fff}
.mtop .acts{display:flex;gap:6px}
.mtop .acts button{padding:6px 14px;border:1px solid #3a3a55;border-radius:8px;background:transparent;font-size:12px;cursor:pointer;color:#aaa}
.mtop .acts button:hover{background:#252545;color:#fff;border-color:#6c5ce7}
.mtop .acts .del:hover{background:#3a1a1a;color:#ff6b6b;border-color:#ff6b6b}
.mbody{flex:1;overflow-y:auto;padding:24px 28px 60px}
.info{font-size:12px;color:#888;margin-bottom:14px;display:flex;gap:14px}
.card{background:#1a1a30;border-radius:12px;border:1px solid #2a2a45;overflow:hidden}
.card iframe{width:100%;border:none;display:block;min-height:400px;background:#fff}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#666;gap:12px}
.empty .ei{font-size:64px;opacity:.15}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:100}
.ov.show{display:flex}
.md{background:#1a1a30;border:1px solid #2a2a45;border-radius:16px;padding:28px;width:700px;max-width:94vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.4)}
.md h2{font-size:17px;margin-bottom:18px;font-weight:700;color:#fff}
.md .fg{margin-bottom:14px}
.md label{display:block;font-size:12px;font-weight:600;color:#aaa;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.md input[type=text],.md textarea{width:100%;padding:10px 14px;border:1px solid #2a2a45;border-radius:8px;font-size:13px;outline:none;background:#12122a;color:#e0e0e0}
.md input:focus,.md textarea:focus{border-color:#6c5ce7}
.md textarea{font-family:'Menlo','Consolas',monospace;font-size:12px;resize:vertical;min-height:220px;line-height:1.6;tab-size:2}
.md .ma{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.md .ma button{padding:10px 24px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.bp{background:linear-gradient(135deg,#6c5ce7,#a855f7);color:#fff}.bp:hover{filter:brightness(1.1)}
.bs{background:#252545;color:#aaa;border:1px solid #3a3a55!important}.bs:hover{background:#2a2a50;color:#fff}
.bp:disabled{opacity:.4;cursor:not-allowed}
.up{border:2px dashed #3a3a55;border-radius:10px;padding:24px;text-align:center;cursor:pointer}
.up:hover,.up.dg{border-color:#6c5ce7;background:#1e1e38}
.up p{font-size:14px;color:#aaa}.up small{font-size:11px;color:#666}
.qi{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#1e1e38;border-radius:8px;margin-bottom:4px;font-size:12px;border:1px solid #2a2a45}
.qi .qn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#ddd}
.qi .qs{color:#666;font-size:10px}
.qi .qst{font-size:10px;font-weight:600}.qst.ok{color:#6c5ce7}.qst.er{color:#ff6b6b}.qst.ld{color:#a855f7}
.qi button{background:none;border:none;color:#ff6b6b;cursor:pointer;font-size:14px}

/* ═══ 编辑器面板（全屏） ═══ */
.editor-overlay{position:fixed;inset:0;background:#0f0f1a;z-index:50;display:none;flex-direction:column}
.editor-overlay.show{display:flex}
.eo-bar{padding:10px 20px;background:#16162a;border-bottom:1px solid #2a2a45;display:flex;align-items:center;gap:12px;min-height:50px}
.eo-bar h2{font-size:15px;font-weight:700;color:#fff;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.eo-bar h2 small{font-weight:400;color:#a855f7;margin-left:8px;font-size:12px}
.eo-bar .acts{display:flex;gap:6px;align-items:center}
.eo-bar .acts button{padding:6px 14px;border:1px solid #3a3a55;border-radius:8px;background:transparent;font-size:12px;cursor:pointer;color:#aaa;display:flex;align-items:center;gap:4px}
.eo-bar .acts button:hover{background:#252545;color:#fff;border-color:#6c5ce7}
.eo-bar .acts .save-btn{background:linear-gradient(135deg,#6c5ce7,#a855f7);color:#fff;border:none}
.eo-bar .acts .save-btn:hover{filter:brightness(1.1)}
.eo-bar .acts .close-btn{border-color:#ff5f56;color:#ff6b6b}
.eo-bar .acts .close-btn:hover{background:#3a1a1a}
.eo-body{flex:1;display:flex;overflow:hidden;position:relative}
.eo-editor{flex:1;display:flex;flex-direction:column;min-width:0}
.eo-preview{flex:1;display:flex;flex-direction:column;border-left:1px solid #2a2a45;min-width:0}
.eo-preview .preview-header{padding:6px 12px;background:#12122a;border-bottom:1px solid #2a2a45;font-size:11px;color:#666;display:flex;align-items:center;gap:8px}
.eo-preview .preview-header label{display:flex;align-items:center;gap:4px;cursor:pointer;margin-left:auto;font-size:10px}
.eo-preview .preview-header input[type=checkbox]{accent-color:#6c5ce7}
.eo-preview iframe{flex:1;border:none;background:#fff}
.resize-handle{width:5px;background:#2a2a45;cursor:col-resize;flex-shrink:0;transition:background .15s;position:relative;z-index:10}
.resize-handle:hover,.resize-handle.active{background:#6c5ce7}

/* CodeMirror 暗色覆盖 */
.cm-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column}
.cm-wrap .cm-editor{flex:1;min-height:0;background:#0d0d1a}
.cm-wrap .cm-editor .cm-scroller{font-family:'Menlo','Consolas','Liberation Mono',monospace;font-size:13px;line-height:1.7;overflow:auto;height:100%}
.cm-wrap .cm-editor .cm-gutters{background:#0a0a16;border-right:1px solid #1a1a30;color:#444}
.cm-wrap .cm-editor .cm-activeLineGutter{background:#12122a;color:#6c5ce7}
.cm-wrap .cm-editor .cm-activeLine{background:rgba(108,92,231,.06)}
.cm-wrap .cm-editor .cm-selectionBackground{background:rgba(108,92,231,.2)!important}
.cm-wrap .cm-editor .cm-cursor{border-left-color:#a855f7}
.cm-wrap .cm-editor.cm-focused{outline:none}
.cm-wrap .cm-editor .cm-tooltip{background:#1a1a30;border:1px solid #2a2a45;color:#e0e0e0}
.cm-wrap .cm-editor .cm-tooltip-autocomplete ul li[aria-selected]{background:#252545}
.cm-wrap .cm-editor .cm-searchMatch{background:rgba(168,85,247,.3);outline:1px solid rgba(168,85,247,.5)}
.cm-wrap .cm-editor .cm-searchMatch.cm-searchMatch-selected{background:rgba(168,85,247,.5)}

.kb-bar{padding:4px 12px;background:#0a0a16;border-top:1px solid #1a1a30;font-size:10px;color:#444;display:flex;gap:16px;flex-wrap:wrap}
.kb-bar kbd{background:#1a1a30;padding:1px 5px;border-radius:3px;color:#888;font-family:inherit;font-size:10px;border:1px solid #2a2a45}
.emmet-hint{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#1a1a30;border:1px solid #6c5ce7;border-radius:8px;padding:6px 14px;font-size:12px;color:#a855f7;z-index:60;display:none;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.emmet-hint.show{display:block}

.toast{position:fixed;bottom:24px;right:24px;padding:10px 20px;border-radius:10px;color:#fff;font-size:13px;font-weight:500;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.3);animation:si .3s ease}
.toast.ok{background:linear-gradient(135deg,#6c5ce7,#a855f7)}.toast.er{background:#ff5f56}
@keyframes si{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.off{position:fixed;top:0;left:0;right:0;background:#ff5f56;color:#fff;text-align:center;padding:6px;font-size:12px;font-weight:600;z-index:300;display:none}
.off.show{display:block}
.ld{display:inline-block;width:14px;height:14px;border:2px solid #3a3a55;border-top-color:#6c5ce7;border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.tk-bar{padding:10px 12px;border-bottom:1px solid #2a2a45;background:#1a1a30;display:flex;align-items:center;gap:8px}
.tk-bar input{flex:1;padding:8px 12px;background:#12122a;border:1px solid #2a2a45;border-radius:8px;color:#ccc;font-size:12px;outline:none}
.tk-bar input:focus{border-color:#6c5ce7}
.tk-bar button{padding:8px 16px;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600;background:#6c5ce7;color:#fff}
.tk-bar button:hover{filter:brightness(1.1)}
.st{font-size:10px;padding:3px 10px;border-radius:6px;font-weight:600}
.st.on{background:#27c93f22;color:#27c93f}.st.off{background:#ff5f5622;color:#ff5f56}

@media(max-width:768px){body{flex-direction:column}.side{width:100%;min-width:100%;height:45vh}.main{min-height:55vh}.md{width:96vw}.eo-body{flex-direction:column}.eo-preview{border-left:none;border-top:1px solid #2a2a45}.resize-handle{width:100%;height:5px;cursor:row-resize}}
</style>
</head>
<body>
<div class="off" id="offBar">⚠️ 网络断开</div>

<aside class="side">
  <h1>🌐 HTML 管理器 <small id="cnt">0</small></h1>
  <div class="tk-bar">
    <input id="tokenInput" type="text" placeholder="粘贴 GitHub Token (ghp_...)" autocomplete="off">
    <button onclick="doSaveToken()">连接</button>
    <span class="st off" id="tokenSt">未连接</span>
  </div>
  <div class="srch"><input id="sI" placeholder="🔍 搜索…" autocomplete="off"></div>
  <div class="list" id="fL"><div style="text-align:center;padding:40px;color:#555;font-size:13px">设置 Token 后自动加载</div></div>
  <div class="sfoot">
    <button class="btn-primary" onclick="doUpload()">＋ 上传</button>
    <button class="btn-outline" onclick="doNew()">📝 新建</button>
  </div>
</aside>

<main class="main">
  <div class="mtop" id="mT" style="display:none">
    <h2 id="mTi"></h2>
    <div class="acts">
      <button onclick="doEdit()">✏️ 编辑</button>
      <button onclick="doPreview()">👁 预览</button>
      <button class="del" onclick="doDel()">🗑 删除</button>
    </div>
  </div>
  <div class="mbody" id="mB">
    <div class="empty"><div class="ei">🌐</div><p>设置 Token 后即可使用</p><small>文件存在 GitHub 仓库，所有人共享</small></div>
  </div>
</main>

<!-- 编辑器全屏面板 -->
<div class="editor-overlay" id="editorOverlay">
  <div class="eo-bar">
    <h2 id="eoTitle">编辑</h2>
    <div class="acts">
      <button onclick="doFmt()" title="格式化代码">🔧 格式化</button>
      <button onclick="toggleWrap()" id="wrapBtn" title="切换自动换行">↩️ 换行</button>
      <button onclick="togglePreview()" id="prevToggleBtn" title="切换预览面板">👁 预览</button>
      <button class="save-btn" onclick="doSaveEdit()" title="Ctrl+S">💾 保存</button>
      <button class="close-btn" onclick="closeEditor()">✕ 关闭</button>
    </div>
  </div>
  <div class="eo-body">
    <div class="eo-editor" id="eoEditor">
      <div class="cm-wrap" id="cmContainer"></div>
    </div>
    <div class="resize-handle" id="resizeHandle"></div>
    <div class="eo-preview" id="eoPreview">
      <div class="preview-header">
        <span>👁 实时预览</span>
        <label><input type="checkbox" id="autoRefresh" checked> 自动刷新</label>
      </div>
      <iframe id="prevFrame"></iframe>
    </div>
  </div>
  <div class="kb-bar">
    <span><kbd>Ctrl</kbd>+<kbd>S</kbd> 保存</span>
    <span><kbd>Ctrl</kbd>+<kbd>F</kbd> 搜索</span>
    <span><kbd>Ctrl</kbd>+<kbd>H</kbd> 替换</span>
    <span><kbd>Ctrl</kbd>+<kbd>D</kbd> 选择下一个匹配</span>
    <span><kbd>Ctrl</kbd>+<kbd>/</kbd> 切换注释</span>
    <span><kbd>Tab</kbd> Emmet 展开</span>
    <span><kbd>Ctrl</kbd>+<kbd>Z</kbd> 撤销</span>
    <span><kbd>Alt</kbd>+<kbd>↑/↓</kbd> 移动行</span>
  </div>
</div>

<div class="emmet-hint" id="emmetHint"></div>

<!-- 上传弹窗 -->
<div class="ov" id="nOv">
  <div class="md">
    <h2>📤 上传 HTML</h2>
    <div class="fg">
      <label class="up" id="upZ" for="fIn"><p>📄 点击或拖拽 HTML 文件</p><small>.html / .htm</small></label>
      <input type="file" id="fIn" accept=".html,.htm" multiple style="display:none">
    </div>
    <div id="fQ"></div>
    <div id="mI">
      <div class="fg"><label>文件名</label><input type="text" id="nN" placeholder="留空用原文件名"></div>
      <div class="fg"><label>HTML</label><textarea id="nC" rows="7" placeholder="粘贴 HTML…"></textarea></div>
    </div>
    <div class="ma"><button class="bs" onclick="closeOv('nOv')">取消</button><button class="bp" onclick="doSave()">保存</button></div>
  </div>
</div>

<!-- 原始脚本（非 module，保证兼容性） -->
<script>
// ═══ 全局变量 ═══
var OWNER = 'ksllove';
var REPO = 'shuanghuanjiyao';
var BRANCH = 'master';
var DIR = 'files';
var API = 'https://api.github.com';
var TOKEN = localStorage.getItem('gh_token') || '';
var FILES = [];
var ACTIVE = null;
var EDITING = null;
var QUEUE = [];
var prevTimer = null;
var editorCm = null;
var previewVisible = true;

// ═══ DOM 工具 ═══
function $(id) { return document.getElementById(id) }
function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML }
function toast(m, t) {
  t = t || 'ok';
  var e = document.createElement('div');
  e.className = 'toast ' + t;
  e.textContent = m;
  document.body.appendChild(e);
  setTimeout(function() { e.remove() }, 3000);
}
function closeOv(id) { $(id).classList.remove('show') }
function openOv(id) { $(id).classList.add('show') }
function fmtSz(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}
function b64e(s) { return btoa(unescape(encodeURIComponent(s))) }
function b64d(s) { try { return decodeURIComponent(escape(atob(s))) } catch(e) { return atob(s) } }

// ═══ HTTP 工具 ═══
function hdrs() {
  var h = { 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' };
  if (TOKEN) h['Authorization'] = 'token ' + TOKEN;
  return h;
}

function apiFetch(url, opts) {
  opts = opts || {};
  opts.headers = hdrs();
  return fetch(url, opts).then(function(r) {
    if (r.status === 401) {
      TOKEN = '';
      localStorage.removeItem('gh_token');
      updateTokenUI();
      FILES = [];
      render();
      toast('⚠️ Token 已过期，请重新输入', 'er');
      setTimeout(function() { $('tokenInput').focus() }, 500);
    }
    return r;
  });
}

// ═══ Token 管理 ═══
function updateTokenUI() {
  var st = $('tokenSt');
  var inp = $('tokenInput');
  if (TOKEN) {
    inp.value = TOKEN.substring(0, 10) + '••••';
    st.textContent = '已连接';
    st.className = 'st on';
  } else {
    inp.value = '';
    st.textContent = '未连接';
    st.className = 'st off';
  }
}

function doSaveToken() {
  var inp = $('tokenInput');
  var v = inp.value.trim();
  if (!v && TOKEN) {
    TOKEN = '';
    localStorage.removeItem('gh_token');
    updateTokenUI();
    FILES = [];
    render();
    toast('已断开');
    return;
  }
  if (!v) { toast('请输入 Token', 'er'); return }
  v = v.replace(/\s/g, '');
  TOKEN = v;
  localStorage.setItem('gh_token', TOKEN);
  toast('正在验证…');
  apiFetch(API + '/user')
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json() })
    .then(function(d) {
      toast('✅ 已连接: ' + d.login);
      updateTokenUI();
      ensureDir().then(loadList);
    })
    .catch(function(e) {
      toast('Token 无效: ' + e.message, 'er');
      TOKEN = '';
      localStorage.removeItem('gh_token');
      updateTokenUI();
    });
}

document.addEventListener('DOMContentLoaded', function() {
  $('tokenInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doSaveToken();
  });
});

// ═══ GitHub API ═══
function apiList() {
  return apiFetch(API + '/repos/' + OWNER + '/' + REPO + '/contents/' + DIR + '?ref=' + BRANCH + '&_=' + Date.now())
    .then(function(r) { if (r.status === 404) return []; if (!r.ok) throw new Error('API ' + r.status); return r.json() });
}

function apiGet(name) {
  return apiFetch(API + '/repos/' + OWNER + '/' + REPO + '/contents/' + DIR + '/' + encodeURIComponent(name) + '?ref=' + BRANCH)
    .then(function(r) { if (!r.ok) throw new Error('获取失败 ' + r.status); return r.json() });
}

function apiPut(name, content, sha) {
  var body = { message: (sha ? '更新: ' : '新建: ') + name, content: b64e(content), branch: BRANCH };
  if (sha) body.sha = sha;
  return apiFetch(API + '/repos/' + OWNER + '/' + REPO + '/contents/' + DIR + '/' + encodeURIComponent(name), {
    method: 'PUT', body: JSON.stringify(body)
  }).then(function(r) {
    if (!r.ok) return r.json().then(function(e) { throw new Error(e.message || '保存失败 ' + r.status) });
    return r.json().then(function(d) { return d.content });
  });
}

function apiDel(name, sha) {
  return apiFetch(API + '/repos/' + OWNER + '/' + REPO + '/contents/' + DIR + '/' + encodeURIComponent(name), {
    method: 'DELETE', body: JSON.stringify({ message: '删除: ' + name, sha: sha, branch: BRANCH })
  }).then(function(r) { if (!r.ok) throw new Error('删除失败 ' + r.status) });
}

function ensureDir() {
  return apiList().then(function(items) {
    if (items.length > 0) return;
    return apiPut('.gitkeep', '', null).catch(function() {});
  });
}

// ═══ 加载列表 ═══
function loadList() {
  if (!TOKEN) return Promise.resolve();
  return apiList()
    .then(function(items) {
      FILES = items
        .filter(function(i) { return i.type === 'file' && /\.html?$/i.test(i.name) && i.name !== 'index.html' })
        .map(function(i) { return { name: i.name, sha: i.sha, size: i.size } })
        .sort(function(a, b) { return b.name.localeCompare(a.name) });
      render();
    })
    .catch(function(e) {
      $('fL').innerHTML = '<div style="padding:20px;text-align:center;color:#ff6b6b;font-size:13px">' + esc(e.message) + '</div>';
      $('cnt').textContent = '错误';
    });
}

function render(q) {
  q = (q || '').toLowerCase();
  var ls = FILES.filter(function(f) { return f.name.toLowerCase().indexOf(q) >= 0 });

    var ok = 0, fail = 0, total = QUEUE.length;
    function next(i) {
      if (i >= total) {
        toast(ok + ' 个成功' + (fail ? '，' + fail + ' 失败' : ''), fail ? 'er' : 'ok');
        loadList().then(function() { closeOv('nOv'); finish() });
        return;

      var f = QUEUE[i]; var st = $('qs' + i);
      st.textContent = '上传…'; st.className = 'qst ld';
      apiGet(f.name).catch(function() { return null })
        .then(function(ex) { return apiPut(f.name, f.content, ex ? ex.sha : null) })
        .then(function() { st.textContent = '✓'; st.className = 'qst ok'; ok++; next(i + 1) })
        .catch(function(e) { st.textContent = '✗ ' + e.message; st.className = 'qst er'; fail++; next(i + 1) });

    next(0);
  } else {

var cmLoaded = false;

function loadScript(src) {
  return new Promise(function(resolve, reject) {
    var s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function ensureCm() {
  if (cmLoaded) return true;
  toast('加载编辑器组件…');
  try {
    // 通过 UMD/IIFE 方式加载 CodeMirror 6 核心
    // 使用 esm.sh 的 bundle 模式，把所有依赖打包到一起
    await loadScript('https://esm.sh/*@codemirror/view@6.36.5?bundle&exports=EditorView,lineNumbers,highlightActiveLineGutter,highlightSpecialChars,drawSelection,dropCursor,allowMultipleSelections,indentOnInput,rectangularSelection,crosshairCursor,highlightActiveLine,highlightSelectionMatches,keymap');
    await loadScript('https://esm.sh/*@codemirror/state@6.5.2?bundle&exports=EditorState');
    await loadScript('https://esm.sh/*@codemirror/commands@6.8.1?bundle&exports=defaultKeymap,history,historyKeymap');
    await loadScript('https://esm.sh/*@codemirror/language@6.10.8?bundle&exports=foldGutter,syntaxHighlighting,defaultHighlightStyle,bracketMatching');
    await loadScript('https://esm.sh/*@codemirror/lang-html@6.4.9?bundle&exports=html');
    await loadScript('https://esm.sh/*@codemirror/autocomplete@6.18.6?bundle&exports=closeBrackets,closeBracketsKeymap,autocompletion,completionKeymap');
    await loadScript('https://esm.sh/*@codemirror/search@6.5.10?bundle&exports=searchKeymap,highlightSelectionMatches');
    await loadScript('https://esm.sh/*@codemirror/lint@6.8.4?bundle&exports=lintKeymap');
    cmLoaded = true;
    toast('编辑器加载完成');
    return true;
  } catch(e) {

  }
}

async function openEditor(title, content, sha) {

}

function openEditorCm(title, content, sha) {
  $('editorOverlay').classList.add('show');
  $('eoTitle').innerHTML = title;
  var container = $('cmContainer');
  container.innerHTML = '';

  var EditorView = window.CM_EditorView;
  var lineNumbers = window.CM_lineNumbers;
  var highlightActiveLineGutter = window.CM_highlightActiveLineGutter;
  var highlightSpecialChars = window.CM_highlightSpecialChars;
  var drawSelection = window.CM_drawSelection;
  var dropCursor = window.CM_dropCursor;
  var allowMultipleSelections = window.CM_allowMultipleSelections;
  var indentOnInput = window.CM_indentOnInput;
  var rectangularSelection = window.CM_rectangularSelection;
  var crosshairCursor = window.CM_crosshairCursor;
  var highlightActiveLine = window.CM_highlightActiveLine;
  var highlightSelectionMatches = window.CM_highlightSelectionMatches;
  var keymap = window.CM_keymap;
  var defaultKeymap = window.CM_defaultKeymap;
  var history = window.CM_history;
  var historyKeymap = window.CM_historyKeymap;
  var foldGutter = window.CM_foldGutter;
  var syntaxHighlighting = window.CM_syntaxHighlighting;
  var defaultHighlightStyle = window.CM_defaultHighlightStyle;
  var bracketMatching = window.CM_bracketMatching;
  var html = window.CM_html;
  var closeBrackets = window.CM_closeBrackets;
  var closeBracketsKeymap = window.CM_closeBracketsKeymap;
  var autocompletion = window.CM_autocompletion;
  var completionKeymap = window.CM_completionKeymap;
  var searchKeymap = window.CM_searchKeymap;
  var highlightSelectionMatches2 = window.CM_highlightSelectionMatches2;
  var lintKeymap = window.CM_lintKeymap;

  var wrap = document.createElement('div');
  wrap.className = 'cm-wrap';
  wrap.style.flex = '1';
  container.appendChild(wrap);

  editorCm = new EditorView({
    doc: content || '',
    parent: wrap,
    extensions: [
      lineNumbers(),
      highlightActiveLineGutter(),
      highlightSpecialChars(),
      history(),
      foldGutter(),
      drawSelection(),
      dropCursor(),
      allowMultipleSelections.of(true),
      indentOnInput(),
      syntaxHighlighting(defaultHighlightStyle, { fallback: true }),
      bracketMatching(),
      autocompletion(),
      rectangularSelection(),
      crosshairCursor(),
      highlightActiveLine(),
      highlightSelectionMatches2(),
      html(),
      keymap.of([
        ...closeBracketsKeymap,
        ...defaultKeymap,
        ...searchKeymap,
        ...historyKeymap,
        ...completionKeymap,
        ...lintKeymap,
        { key: 'Tab', run: function(view) {
          var state = view.state;
          var pos = state.selection.main.head;
          var line = state.doc.lineAt(pos);
          var textBefore = line.text.slice(0, pos - line.from);
          var match = textBefore.match(/[\w\.\#\>\+\*\^\(\)\[\]\$\{\}\/\:]+$/);
          if (match && emmetExp) {
            try {
              var expanded = emmetExp(match[0], { syntax: 'html' });
              if (expanded && expanded !== match[0]) {
                var from = pos - match[0].length;
                view.dispatch({ changes: { from: from, to: pos, insert: expanded }, selection: { anchor: from + expanded.length } });
                showEmmetHint(match[0] + ' → ' + expanded.substring(0, 50));
                return true;
              }
            } catch(e) {}
          }
          if (view.state.selection.main.empty) {
            view.dispatch({ changes: { from: pos, insert: '  ' }, selection: { anchor: pos + 2 } });
            return true;
          }
          return false;
        }},
        { key: 'Alt-ArrowUp', run: function(view) {
          var state = view.state;
          var line = state.doc.lineAt(state.selection.main.head);
          if (line.number <= 1) return false;
          var prevLine = state.doc.line(line.number - 1);
          view.dispatch({ changes: [{ from: prevLine.from, to: line.to, insert: line.text + '\n' + prevLine.text }], selection: { anchor: prevLine.from + line.text.length } });
          return true;
        }},
        { key: 'Alt-ArrowDown', run: function(view) {
          var state = view.state;
          var line = state.doc.lineAt(state.selection.main.head);
          if (line.number >= state.doc.lines) return false;
          var nextLine = state.doc.line(line.number + 1);
          view.dispatch({ changes: [{ from: line.from, to: nextLine.to, insert: nextLine.text + '\n' + line.text }], selection: { anchor: line.from + nextLine.text.length + 1 + line.text.length } });
          return true;
        }},
      ]),
      EditorView.updateListener.of(function(update) {
        if (update.docChanged) onEditorChange();
      }),
      EditorView.theme({ '&': { flex: '1', minHeight: '0' }, '.cm-scroller': { overflow: 'auto', height: '100%' } }),
    ],
  });

  editorCm._savedSha = sha || null;
  doRefreshPrev();
  setTimeout(function() { editorCm.focus() }, 150);
}

function getEditorContent() {
  if (editorCm && editorCm.state) return editorCm.state.doc.toString();
  var fb = document.getElementById('fallbackEditor');
  return fb ? fb.value : '';
}

function onEditorChange() {
  clearTimeout(prevTimer);
  if ($('autoRefresh').checked) prevTimer = setTimeout(doRefreshPrev, 300);
}

function doRefreshPrev() {
  var f = $('prevFrame');
  var c = getEditorContent();
  try { var d = f.contentDocument || f.contentWindow.document; d.open(); d.write(c); d.close() } catch(e) {}
}

function closeEditor() {
  $('editorOverlay').classList.remove('show');
  if (editorCm) { editorCm.destroy && editorCm.destroy(); editorCm = null; }
  $('cmContainer').innerHTML = '';
}

function doSaveEdit() {
  var nm = EDITING || ('未命名-' + Date.now().toString(36) + '.html');
  var ct = getEditorContent();
  var sha = (editorCm && editorCm._savedSha) || null;
  var fb = document.getElementById('fallbackEditor');
  if (!editorCm && fb) sha = fb.dataset.sha || null;

  if (!EDITING) {
    var name = prompt('文件名:', nm);
    if (!name) return;
    nm = name.endsWith('.html') ? name : name + '.html';
  }

  apiPut(nm, ct, sha)
    .then(function(r) {
      if (editorCm) editorCm._savedSha = r.sha;
      if (fb) fb.dataset.sha = r.sha;
      EDITING = nm; ACTIVE = nm;
      toast('「' + nm + '」已保存');
      return loadList();
    })
    .then(function() { render($('sI').value) })
    .catch(function(e) { toast('保存失败: ' + e.message, 'er') });
}

function doFmt() {
  var code = getEditorContent();
  var indent = 0;
  var formatted = code.replace(/>\s*</g, '>\n<').split('\n').map(function(l) {
    l = l.trim();
    if (!l) return '';
    if (l.match(/^<\/\w/)) indent = Math.max(0, indent - 1);
    var r = '  '.repeat(indent) + l;
    if (l.match(/^<\w[^>]*[^\/]>.*$/) && !l.match(/^<(br|hr|img|input|meta|link|source|area|base|col|embed|track|wbr)/i)) indent++;
    return r;
  }).join('\n');

  if (editorCm && editorCm.dispatch) {
    editorCm.dispatch({ changes: { from: 0, to: editorCm.state.doc.length, insert: formatted } });
  } else {
    var fb = document.getElementById('fallbackEditor');
    if (fb) fb.value = formatted;
  }
  toast('已格式化');
}

function showEmmetHint(text) {
  var hint = $('emmetHint');

  hint.classList.add('show');
  setTimeout(function() { hint.classList.remove('show') }, 2000);

// ═══ 拖拽分屏 ═══
(function() {
  var handle = $('resizeHandle');
  var editorPanel = $('eoEditor');
  var previewPanel = $('eoPreview');
  var dragging = false, startX, startEditorW;

  handle.addEventListener('mousedown', function(e) {
    dragging = true; startX = e.clientX;
    startEditorW = editorPanel.getBoundingClientRect().width;
    handle.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var dx = e.clientX - startX;
    var container = document.querySelector('.eo-body');
    var totalW = container.getBoundingClientRect().width - 5;
    var newEditorW = Math.max(200, Math.min(totalW - 200, startEditorW + dx));
    editorPanel.style.flex = 'none'; editorPanel.style.width = (newEditorW / totalW * 100) + '%';
    previewPanel.style.flex = '1';
  });
  document.addEventListener('mouseup', function() {
    if (!dragging) return;
    dragging = false; handle.classList.remove('active');
    document.body.style.cursor = ''; document.body.style.userSelect = '';
  });
})();
