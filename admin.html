<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会议纪要 - 管理后台</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#1e1e2e;min-height:100vh}

  /* Login */
  .login-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(4px)}
  .login-box{background:#fff;border-radius:16px;padding:32px;width:380px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .login-box h2{font-size:18px;margin-bottom:4px}
  .login-box .sub{font-size:13px;color:#666;margin-bottom:20px}
  .login-box input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;margin-bottom:12px}
  .login-box input:focus{border-color:#89b4fa}
  .login-box button{width:100%;padding:10px;border:none;border-radius:8px;background:#89b4fa;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
  .login-box button:hover{background:#74c7ec}
  .login-box .err{color:#f38ba8;font-size:12px;margin-bottom:8px;min-height:18px}

  /* Header */
  .top-bar{background:#1e1e2e;color:#cdd6f4;padding:12px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
  .top-bar h1{font-size:15px;font-weight:700}
  .top-bar .spacer{flex:1}
  .top-bar .badge{font-size:11px;background:#313244;padding:3px 10px;border-radius:12px}
  .top-bar .btn-link{color:#6c7086;font-size:12px;text-decoration:none;padding:4px 10px;border-radius:6px}
  .top-bar .btn-link:hover{background:#313244;color:#cdd6f4}
  .top-bar .btn-logout{color:#f38ba8;font-size:12px;cursor:pointer;padding:4px 10px;border-radius:6px;border:none;background:none}
  .top-bar .btn-logout:hover{background:#45475a}

  /* Toolbar */
  .toolbar{max-width:1100px;margin:0 auto;padding:16px 24px;display:flex;gap:10px;align-items:center}
  .toolbar input{flex:1;padding:9px 14px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;background:#fff}
  .toolbar input:focus{border-color:#89b4fa}
  .toolbar .btn{padding:9px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
  .btn-primary{background:#89b4fa;color:#1e1e2e}.btn-primary:hover{background:#74c7ec}
  .btn-danger{background:#f38ba8;color:#fff}.btn-danger:hover{background:#eba0ac}

  /* Table */
  .table-wrap{max-width:1100px;margin:0 auto;padding:0 24px 60px}
  .table{width:100%;background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden}
  .table table{width:100%;border-collapse:collapse}
  .table th{background:#f8fafc;padding:10px 16px;text-align:left;font-size:12px;color:#64748b;font-weight:600;border-bottom:1px solid #e2e8f0}
  .table td{padding:10px 16px;border-bottom:1px solid #f1f5f9;font-size:13px}
  .table tr:last-child td{border-bottom:none}
  .table tr:hover td{background:#f8fafc}
  .table .actions{display:flex;gap:6px}
  .table .actions button{padding:4px 10px;border:1px solid #e2e8f0;border-radius:6px;background:#fff;font-size:11.5px;cursor:pointer;transition:all .1s}
  .table .actions .btn-edit:hover{background:#dbeafe;border-color:#93c5fd}
  .table .actions .btn-del:hover{background:#fee2e2;border-color:#fca5a5;color:#dc2626}
  .table .empty-row td{text-align:center;color:#94a3b8;padding:40px}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(2px)}
  .modal{background:#fff;border-radius:16px;padding:28px;width:560px;max-width:92vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
  .modal h2{font-size:17px;margin-bottom:16px}
  .modal .fg{margin-bottom:14px}
  .modal .fg label{display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:4px}
  .modal .fg input{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;font-family:inherit}
  .modal .fg input:focus{border-color:#89b4fa}
  .modal .fg textarea{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none;font-family:'Menlo','Consolas',monospace;resize:vertical;min-height:200px}
  .modal .fg textarea:focus{border-color:#89b4fa}
  .modal .fr{display:flex;gap:12px}
  .modal .fr .fg{flex:1}
  .modal .modal-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
  .modal .modal-actions button{padding:8px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}

  /* Upload zone */
  .uz{border:2px dashed #dce0e8;border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .15s}
  .uz:hover,.uz.dg{border-color:#89b4fa;background:#f0f4ff}
  .uz .ui{font-size:24px;opacity:.4;margin-bottom:4px}
  .uz p{font-size:12.5px;color:#585b70}

  /* Toast */
  .toast{position:fixed;bottom:24px;right:24px;padding:10px 20px;border-radius:10px;color:#fff;font-size:13px;font-weight:500;z-index:999;animation:slideIn .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.15)}
  .toast.ok{background:#10b981}.toast.err{background:#ef4444}.toast.info{background:#3b82f6}
  @keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

  .hidden{display:none!important}
  .loading{text-align:center;padding:40px;color:#94a3b8}
  .loading .sp{display:inline-block;width:20px;height:20px;border:2px solid #e2e8f0;border-top-color:#89b4fa;border-radius:50%;animation:spin .6s linear infinite;margin-bottom:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- Login -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>🔐 管理员登录</h2>
    <p class="sub">输入 GitHub Token 进入管理后台</p>
    <div class="err" id="loginErr"></div>
    <input type="password" id="tokenInput" placeholder="GitHub Personal Access Token">
    <button id="loginBtn">登录</button>
  </div>
</div>

<!-- App -->
<div class="app" id="app">
  <div class="top-bar">
    <h1>📋 会议纪要管理</h1>
    <span class="badge" id="fileCount">0 条纪要</span>
    <div class="spacer"></div>
    <a href="index.html" class="btn-link" target="_blank">👁 查看公开页</a>
    <button class="btn-logout" id="logoutBtn">退出</button>
  </div>

  <div class="toolbar">
    <input id="searchInput" placeholder="搜索会议纪要…">
    <button class="btn btn-primary" id="btnNew">➕ 新建纪要</button>
  </div>

  <div class="table-wrap">
    <div class="table" id="tableWrap">
      <div class="loading"><div class="sp"></div><br>加载中…</div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal" id="modal"></div>
</div>

<script>
const API = 'https://api.github.com';
const OWNER = 'ksllove';
const REPO = 'shuanghuanjiyao';
const BRANCH = 'main';
const TOKEN_KEY = 'gh_admin_token';

let TOKEN = '';
let FILES = []; // [{name, path, sha, size, download_url}]
let editingFile = null; // null=new, {name, sha} = edit

// ─── Auth ───
function loadToken() { return localStorage.getItem(TOKEN_KEY); }
function saveToken(t) { localStorage.setItem(TOKEN_KEY, t); }
function clearToken() { localStorage.removeItem(TOKEN_KEY); TOKEN = ''; }

async function verifyToken(token) {
  const res = await fetch(`${API}/repos/${OWNER}/${REPO}`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  return res.ok;
}

async function api(method, path, body) {
  const opts = {
    method,
    headers: {
      Authorization: `Bearer ${TOKEN}`,
      'Content-Type': 'application/json',
      Accept: 'application/vnd.github.v3+json'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${API}/repos/${OWNER}/${REPO}/contents/${path}`, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.message || 'API 错误');
  return data;
}

// ─── Toast ───
function toast(msg, type = 'ok') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ─── Load Files ───
async function loadFiles() {
  try {
    const res = await fetch(`${API}/repos/${OWNER}/${REPO}/contents/?ref=${BRANCH}`, {
      headers: { Authorization: `Bearer ${TOKEN}` }
    });
    const items = await res.json();
    FILES = items
      .filter(f => f.name.endsWith('.html') && f.name !== 'index.html' && f.name !== 'admin.html')
      .sort((a, b) => b.name.localeCompare(a.name));
    renderTable();
  } catch (e) {
    toast('加载文件列表失败: ' + e.message, 'err');
  }
}

function renderTable(q) {
  q = (q || '').toLowerCase();
  const list = FILES.filter(f => f.name.toLowerCase().includes(q));
  document.getElementById('fileCount').textContent = list.length + ' 条纪要';

  const el = document.getElementById('tableWrap');
  if (!list.length) {
    el.innerHTML = `<div class="table"><table>
      <tr><th>文件名</th><th>大小</th><th>操作</th></tr>
      <tr class="empty-row"><td colspan="3">${q ? '没有匹配的结果' : '暂无会议纪要，点击上方"新建纪要"开始'}</td></tr>
    </table></div>`;
    return;
  }

  el.innerHTML = `<div class="table"><table>
    <tr><th>文件名</th><th>大小</th><th>操作</th></tr>
    ${list.map(f => `
      <tr data-name="${esc(f.name)}">
        <td><strong>${esc(f.name.replace(/\.html?$/i, ''))}</strong><br><span style="font-size:11px;color:#94a3b8">${esc(f.name)}</span></td>
        <td style="color:#64748b;font-size:12px">${(f.size / 1024).toFixed(1)} KB</td>
        <td><div class="actions">
          <button class="btn-edit" data-edit="${esc(f.name)}">✏️ 编辑</button>
          <button class="btn-del" data-del="${esc(f.name)}">🗑 删除</button>
        </div></td>
      </tr>`).join('')}
  </table></div>`;
}

// ─── Modal ───
function showModal(html) {
  document.getElementById('modal').innerHTML = html;
  document.getElementById('modalOverlay').classList.remove('hidden');
}
function hideModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
  editingFile = null;
}

// ─── New ───
function showNew() {
  editingFile = null;
  showModal(`
    <h2>➕ 新建会议纪要</h2>
    <div class="fg"><label>文件名</label><input id="mName" placeholder="例：2024-04-22-项目评审会"></div>
    <div class="fg">
      <label>内容 (HTML)</label>
      <div class="uz" id="uploadZone">
        <div class="ui">📄</div>
        <p>拖拽或点击上传 HTML 文件（可选）</p>
      </div>
      <textarea id="mContent" placeholder="或直接在此编写 HTML 内容…" rows="10"><!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>会议纪要</title></head>
<body>
<h1>会议标题</h1>
<p><strong>日期：</strong>2024-04-22</p>
<p><strong>参会人：</strong></p>
<h2>会议内容</h2>
<ol>
  <li></li>
</ol>
<h2>决议事项</h2>
<ol>
  <li></li>
</ol>
</body>
</html></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" id="mSave">保存</button>
      <button class="btn" style="background:#f1f5f9;color:#475569" id="mCancel">取消</button>
    </div>
  `);
  setupUploadZone('uploadZone', 'mContent');
  document.getElementById('mSave').onclick = saveNew;
  document.getElementById('mCancel').onclick = hideModal;
}

function setupUploadZone(zoneId, textareaId) {
  const zone = document.getElementById(zoneId);
  const fi = document.createElement('input');
  fi.type = 'file'; fi.accept = '.html,.htm'; fi.style.display = 'none';
  zone.appendChild(fi);
  zone.onclick = () => fi.click();
  zone.ondragover = e => { e.preventDefault(); zone.classList.add('dg'); };
  zone.ondragleave = () => zone.classList.remove('dg');
  zone.ondrop = async e => {
    e.preventDefault(); zone.classList.remove('dg');
    const file = e.dataTransfer.files[0];
    if (file && /\.html?$/i.test(file.name)) {
      document.getElementById(textareaId).value = await file.text();
      toast('文件已导入', 'info');
    }
  };
  fi.onchange = async e => {
    const file = e.target.files[0];
    if (file) {
      document.getElementById(textareaId).value = await file.text();
      toast('文件已导入', 'info');
    }
  };
}

async function saveNew() {
  let name = document.getElementById('mName').value.trim();
  const content = document.getElementById('mContent').value;
  if (!name) { toast('请输入文件名', 'err'); return; }
  if (!name.endsWith('.html')) name += '.html';

  const btn = document.getElementById('mSave');
  btn.textContent = '保存中…'; btn.disabled = true;

  try {
    await api('PUT', encodeURIComponent(name), {
      message: `添加会议纪要: ${name}`,
      content: btoa(unescape(encodeURIComponent(content))),
      branch: BRANCH
    });
    toast('创建成功！');
    hideModal();
    await loadFiles();
  } catch (e) {
    toast('创建失败: ' + e.message, 'err');
    btn.textContent = '保存'; btn.disabled = false;
  }
}

// ─── Edit ───
async function showEdit(name) {
  const file = FILES.find(f => f.name === name);
  if (!file) return;

  showModal('<h2>加载中…</h2>');

  try {
    const res = await fetch(file.download_url);
    const content = await res.text();
    editingFile = { name, sha: file.sha };

    showModal(`
      <h2>✏️ 编辑会议纪要</h2>
      <div class="fg"><label>文件名</label><input id="mName" value="${esc(name)}"></div>
      <div class="fg">
        <label>内容 (HTML)</label>
        <textarea id="mContent" rows="16">${esc(content)}</textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="mSave">保存修改</button>
        <button class="btn" style="background:#f1f5f9;color:#475569" id="mCancel">取消</button>
      </div>
    `);

    document.getElementById('mSave').onclick = saveEdit;
    document.getElementById('mCancel').onclick = hideModal;
  } catch (e) {
    toast('加载失败: ' + e.message, 'err');
    hideModal();
  }
}

async function saveEdit() {
  let name = document.getElementById('mName').value.trim();
  const content = document.getElementById('mContent').value;
  if (!name) { toast('请输入文件名', 'err'); return; }
  if (!name.endsWith('.html')) name += '.html';

  const btn = document.getElementById('mSave');
  btn.textContent = '保存中…'; btn.disabled = true;

  try {
    // If rename: delete old, create new
    if (name !== editingFile.name) {
      await api('DELETE', encodeURIComponent(editingFile.name), {
        message: `重命名 ${editingFile.name} → ${name}`,
        sha: editingFile.sha,
        branch: BRANCH
      });
      await api('PUT', encodeURIComponent(name), {
        message: `重命名 ${editingFile.name} → ${name}`,
        content: btoa(unescape(encodeURIComponent(content))),
        branch: BRANCH
      });
    } else {
      await api('PUT', encodeURIComponent(name), {
        message: `更新会议纪要: ${name}`,
        content: btoa(unescape(encodeURIComponent(content))),
        sha: editingFile.sha,
        branch: BRANCH
      });
    }
    toast('保存成功！');
    hideModal();
    await loadFiles();
  } catch (e) {
    toast('保存失败: ' + e.message, 'err');
    btn.textContent = '保存修改'; btn.disabled = false;
  }
}

// ─── Delete ───
async function deleteFile(name) {
  const file = FILES.find(f => f.name === name);
  if (!file) return;
  if (!confirm(`确定删除 "${name.replace(/\.html?$/i, '')}" ？\n\n此操作不可撤销！`)) return;

  try {
    await api('DELETE', encodeURIComponent(name), {
      message: `删除会议纪要: ${name}`,
      sha: file.sha,
      branch: BRANCH
    });
    toast('已删除');
    await loadFiles();
  } catch (e) {
    toast('删除失败: ' + e.message, 'err');
  }
}

// ─── Events ───
document.getElementById('btnNew').onclick = showNew;
document.getElementById('searchInput').oninput = e => renderTable(e.target.value);
document.getElementById('logoutBtn').onclick = () => {
  clearToken();
  document.getElementById('loginOverlay').classList.remove('hidden');
};
document.getElementById('modalOverlay').onclick = e => {
  if (e.target === document.getElementById('modalOverlay')) hideModal();
};

document.addEventListener('click', e => {
  const editBtn = e.target.closest('[data-edit]');
  if (editBtn) { showEdit(editBtn.dataset.edit); return; }
  const delBtn = e.target.closest('[data-del]');
  if (delBtn) { deleteFile(delBtn.dataset.del); return; }
});

// ─── Login ───
async function doLogin() {
  const input = document.getElementById('tokenInput');
  const err = document.getElementById('loginErr');
  const token = input.value.trim();
  if (!token) { err.textContent = '请输入 Token'; return; }

  err.textContent = '验证中…';
  const ok = await verifyToken(token);
  if (!ok) { err.textContent = 'Token 无效或无权限'; return; }

  TOKEN = token;
  saveToken(token);
  document.getElementById('loginOverlay').classList.add('hidden');
  loadFiles();
}

document.getElementById('loginBtn').onclick = doLogin;
document.getElementById('tokenInput').onkeydown = e => { if (e.key === 'Enter') doLogin(); };

// ─── Init ───
(async function init() {
  const saved = loadToken();
  if (saved) {
    const ok = await verifyToken(saved);
    if (ok) {
      TOKEN = saved;
      document.getElementById('loginOverlay').classList.add('hidden');
      loadFiles();
      return;
    }
  }
  // Show login
})();

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
</script>
</body>
</html>
